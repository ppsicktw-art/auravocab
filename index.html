    const LOCAL_LIB_UPDATED_KEY = 'auravocab_lib_updated_at';

    let firebaseAuth = null;
    let firebaseDb = null;

    const initFirebase = () => {
      if (!window.firebase) return null;
      if (!firebase.apps?.length) firebase.initializeApp(FIREBASE_CONFIG);
      if (!firebaseAuth) firebaseAuth = firebase.auth();
      if (!firebaseDb) firebaseDb = firebase.firestore();
      return { auth: firebaseAuth, db: firebaseDb };
    };

    const loadLastFirebaseSync = () => {
      try {
        const raw = localStorage.getItem(LAST_FIREBASE_SYNC_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    };

    const saveLastFirebaseSync = (info) =>
      localStorage.setItem(LAST_FIREBASE_SYNC_KEY, JSON.stringify(info));

    const loadAutoSync = () => localStorage.getItem(AUTO_SYNC_KEY) !== 'false';

    const saveAutoSync = (enabled) =>
      localStorage.setItem(AUTO_SYNC_KEY, enabled ? 'true' : 'false');

    const touchLocalLibraryUpdatedAt = () =>
      localStorage.setItem(LOCAL_LIB_UPDATED_KEY, String(Date.now()));

    const getLocalLibraryUpdatedAt = () =>
      Number(localStorage.getItem(LOCAL_LIB_UPDATED_KEY) || 0);

    const getLibraryDocRef = (uid) =>
      firebaseDb.collection('users').doc(uid).collection('data').doc('library');

    const formatSyncTime = (ts) => {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const sanitizeForFirestore = (value) => JSON.parse(JSON.stringify(value));

    const uploadLibraryToCloud = async (uid, library) => {
      const updatedAt = Date.now();
      touchLocalLibraryUpdatedAt();
      const cleanLibrary = sanitizeForFirestore(library);
      await getLibraryDocRef(uid).set({
        app: 'AuraVocab',
        appVersion: APP_VERSION,
        library: cleanLibrary,
        count: cleanLibrary.length,
        updatedAt,
      });
      const info = { direction: 'upload', at: updatedAt, count: library.length };
      saveLastFirebaseSync(info);
      return { updatedAt, info };
    };

    const fetchCloudLibrary = async (uid) => {
      const snap = await getLibraryDocRef(uid).get();
      if (!snap.exists) return null;
      const data = snap.data();
      return {
        library: Array.isArray(data.library) ? data.library : [],
        updatedAt: data.updatedAt || 0,
        count: data.count || 0,
      };
    };

    const playAudio = (text) => {
      if (!text || !window.speechSynthesis) return;
      const synth = window.speechSynthesis;
      synth.cancel();
      const speak = () => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        const voices = synth.getVoices();
        const enVoice = voices.find(v => v.lang.startsWith('en-US') && v.localService)
          || voices.find(v => v.lang.startsWith('en'));
        if (enVoice) utterance.voice = enVoice;
        synth.speak(utterance);
      };
      const voices = synth.getVoices();
      if (voices.length) speak();
      else synth.addEventListener('voiceschanged', speak, { once: true });
    };

      window.speechSynthesis.getVoices();

      let inputIdx = 0;

        if (char === ' ') return '  ';
        if (/[a-zA-Z]/.test(char)) {
          const display = inputIdx < input.length ? input[inputIdx] : '_';
          inputIdx++;
          return display + ' ';
        }
        return char + ' ';
      }).join('');

    const buildSpellingDiff = (actual, typed) => {
      const maxLen = Math.max(actual.length, typed.length);
      const cells = [];
      for (let i = 0; i < maxLen; i++) {
        const a = actual[i];
        const t = typed[i];
        if (t === undefined) {
          cells.push({ char: '_', status: 'missing' });
        } else if (a === undefined) {
          cells.push({ char: t, status: 'extra' });
        } else if (a.toLowerCase() === t.toLowerCase()) {
          cells.push({ char: t, status: 'correct' });
        } else {
          cells.push({ char: t, status: 'wrong' });
        }
      }
      return cells;
    };

    const buildCorrectAnswerDiff = (actual, typed) => {
      let typedIdx = 0;
      return actual.split('').map(char => {
        if (!/[a-zA-Z]/.test(char)) return { char, status: 'neutral' };
        const t = typed[typedIdx];
        typedIdx += 1;
        if (t === undefined) return { char, status: 'wrong' };
        if (char.toLowerCase() === t.toLowerCase()) return { char, status: 'correct' };
        return { char, status: 'wrong' };
      });

        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');

【片語卡特徵】深綠色背景、白色文字，通常含：英文片語 → 中文翻譯 → 英文例句 → 中文例句

→ type 設為 "word"，exampleEn 與 exampleZh 留空字串，不要自行補例句

僅回傳 JSON：{ "items": [ { "word": "...", "pronunciation": "...", "translation": "...", "exampleEn": "...", "exampleZh": "...", "type": "word 或 phrase" } ] }`;

    const normalizeScannedItems = (parsed, mode) => {

      if (mode === 'word') return filtered.map(item => ({ ...item, type: 'word', exampleEn: '', exampleZh: '' }));

    // --- Anki 式 SRS 排程 (T013) ---
    const LEARNING_STEPS = [1, 10];
    const RELEARNING_STEPS = [10];
    const GRADUATING_INTERVAL = 1;
    const EASY_INTERVAL_NEW = 4;
    const MIN_EASE = 1.3;
    const STATE_LABELS = { new: '新卡', learning: '學習中', review: '複習', relearning: '重學' };
    const CARD_PRIORITY = { relearning: 0, learning: 1, new: 2, review: 3 };

    const createSrsFields = () => ({
      state: 'new', learningStep: 0, lapses: 0,
      interval: 0, ease: 2.5, repetitions: 0, nextDueDate: null,
    });

    const scheduleAfterMinutes = (minutes) =>
      new Date(Date.now() + minutes * 60 * 1000).toISOString();

    const scheduleAfterDays = (days) => {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + days);
      return d.toISOString();
    };

    const migrateCard = (card) => {
      if (card.state) return card;
      let state = 'new';
      let learningStep = 0;
      if (card.repetitions > 0 && card.interval > 0) {
        state = 'review';
      } else if (card.nextDueDate && card.interval === 0 && card.repetitions === 0) {
        const remaining = new Date(card.nextDueDate).getTime() - Date.now();
        if (remaining > 0 && remaining <= 24 * 60 * 60 * 1000) {
          state = 'learning';
          learningStep = 1;
        }
      }
      return {
        ...card,
        state,
        learningStep,
        lapses: card.lapses || 0,
        interval: card.interval ?? 0,
        ease: card.ease ?? 2.5,
        repetitions: card.repetitions ?? 0,
      };
    };

    const isCardDue = (card, now = new Date()) => {
      const c = migrateCard(card);
      if (c.state === 'new' || !c.nextDueDate) return true;
      return new Date(c.nextDueDate).getTime() <= now.getTime();
    };

    const getDueCards = (library, now = new Date()) =>

    const adjustEase = (ease, rating) => {
      if (rating === 0) return Math.max(MIN_EASE, ease - 0.2);
      if (rating === 1) return Math.max(MIN_EASE, ease - 0.15);
      if (rating === 3) return ease + 0.15;
      return ease;
    };

    const applyAnkiRating = (card, rating) => {
      let { state, learningStep, lapses, interval, ease, repetitions, previousInterval } = migrateCard(card);
      ease = adjustEase(ease, rating);
      if (state === 'new') state = 'learning';

      if (state === 'learning' || state === 'relearning') {
        const steps = state === 'learning' ? LEARNING_STEPS : RELEARNING_STEPS;
        if (rating === 0) {
          return { ...card, state, learningStep: 0, lapses, interval: 0, ease, repetitions: 0, nextDueDate: scheduleAfterMinutes(steps[0]) };
        }
        if (rating === 1) {
          const mins = steps[Math.min(learningStep, steps.length - 1)];
          return { ...card, state, learningStep, lapses, interval: 0, ease, repetitions, nextDueDate: scheduleAfterMinutes(mins) };
        }
        if (rating === 3 && state === 'learning') {
          return { ...card, state: 'review', learningStep: 0, lapses, interval: EASY_INTERVAL_NEW, ease, repetitions: 1, nextDueDate: scheduleAfterDays(EASY_INTERVAL_NEW) };
        }
        const delay = steps[Math.min(learningStep, steps.length - 1)];
        learningStep += 1;
        if (learningStep >= steps.length) {
          if (state === 'relearning') {
            const restored = Math.max(1, Math.round((previousInterval || interval || 1) * 0.5));
            return { ...card, state: 'review', learningStep: 0, lapses, interval: restored, ease, repetitions: Math.max(1, repetitions), nextDueDate: scheduleAfterDays(restored) };
          }
          return { ...card, state: 'review', learningStep: 0, lapses, interval: GRADUATING_INTERVAL, ease, repetitions: 1, nextDueDate: scheduleAfterDays(GRADUATING_INTERVAL) };
        }
        return { ...card, state, learningStep, lapses, interval: 0, ease, repetitions, nextDueDate: scheduleAfterMinutes(delay) };
      }

      if (rating === 0) {
        lapses += 1;
        return { ...card, state: 'relearning', learningStep: 0, lapses, previousInterval: interval, interval: 0, ease, repetitions: 0, nextDueDate: scheduleAfterMinutes(RELEARNING_STEPS[0]) };
      }
      if (rating === 1) {
        repetitions += 1;
        interval = repetitions === 1 ? 1 : Math.max(1, Math.round(interval * 1.2));
        return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
      }
      if (rating === 2) {
        repetitions += 1;
        if (repetitions === 1) interval = GRADUATING_INTERVAL;
        else if (repetitions === 2) interval = 6;
        else interval = Math.max(1, Math.round(interval * ease));
        return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
      }
      repetitions += 1;
      if (repetitions === 1) interval = EASY_INTERVAL_NEW;
      else interval = Math.max(1, Math.round(interval * ease * 1.3));
      return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
    };

    const getRatingLabels = (card) => {
      const c = migrateCard(card);
      const fmtMin = (m) => `${m}分鐘`;
      const fmtDay = (d) => `${d}天`;
      if (c.state === 'new' || c.state === 'learning') {
        const steps = LEARNING_STEPS;
        const step = c.state === 'new' ? 0 : c.learningStep;
        return {
          again: fmtMin(steps[0]),
          hard: fmtMin(steps[Math.min(step, steps.length - 1)]),
          good: step + 1 >= steps.length ? fmtDay(GRADUATING_INTERVAL) : fmtMin(steps[step]),
          easy: fmtDay(EASY_INTERVAL_NEW),

      }
      if (c.state === 'relearning') {
        const steps = RELEARNING_STEPS;

        return {

          hard: fmtMin(steps[Math.min(step, steps.length - 1)]),
          good: step + 1 >= steps.length ? '恢復複習' : fmtMin(steps[step]),
          easy: fmtDay(c.previousInterval || c.interval || GRADUATING_INTERVAL),
        };
      }
      const rep = c.repetitions + 1;
      let goodDays = rep === 1 ? GRADUATING_INTERVAL : rep === 2 ? 6 : Math.max(1, Math.round(c.interval * c.ease));
      let hardDays = rep === 1 ? 1 : Math.max(1, Math.round(c.interval * 1.2));
      let easyDays = rep === 1 ? EASY_INTERVAL_NEW : Math.max(1, Math.round(c.interval * c.ease * 1.3));
      return {
        again: fmtMin(RELEARNING_STEPS[0]),
        hard: fmtDay(hardDays),
        good: fmtDay(goodDays),
        easy: fmtDay(easyDays),
      };
    };

    const pickNextCard = (activeDue, excludeId = null) => {
      const candidates = (excludeId ? activeDue.filter(c => c.id !== excludeId) : activeDue).map(migrateCard);
      if (candidates.length === 0) return null;
      const minP = Math.min(...candidates.map(c => CARD_PRIORITY[c.state] ?? 9));
      const pool = candidates.filter(c => (CARD_PRIORITY[c.state] ?? 9) === minP);
      return pool[Math.floor(Math.random() * pool.length)];

    const getImageMimeType = (file) =>

    const cleanWordToken = (word) =>
      word.replace(/^[.,\/#!$%\^&\*;:{}=\-_`~()?"'“‘]+/g, '').replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'”’]+$/g, '');

    const cleanJsonString = (str) => {
      const trimmed = str.trim();
      try { return JSON.parse(trimmed); } catch (_) {}
      const objMatch = trimmed.match(/\{[\s\S]*\}/);
      if (objMatch) return JSON.parse(objMatch[0]);
      const arrMatch = trimmed.match(/\[[\s\S]*\]/);
      if (arrMatch) return JSON.parse(arrMatch[0]);
      throw new Error('無法解析 AI 回傳的 JSON');
    };

    const normalizeImportedLibrary = (parsed) => {
      if (!Array.isArray(parsed)) throw new Error('格式不正確');
      return parsed
        .filter(item => item && typeof item.word === 'string' && item.word.trim())
        .map((item, index) => ({
          id: item.id || `${Date.now()}_${index}`,
          word: item.word.trim(),
          translation: getTranslation(item) || item.word,
          pronunciation: item.pronunciation || '',
          exampleEn: item.exampleEn || '',
          exampleZh: item.exampleZh || '',
          type: item.type === 'phrase' ? 'phrase' : 'word',
          addedAt: item.addedAt || Date.now(),
          ...createSrsFields(),
          interval: typeof item.interval === 'number' ? item.interval : 0,
          ease: typeof item.ease === 'number' ? item.ease : 2.5,
          repetitions: typeof item.repetitions === 'number' ? item.repetitions : 0,
          nextDueDate: item.nextDueDate || null,
          state: item.state || 'new',
          learningStep: typeof item.learningStep === 'number' ? item.learningStep : 0,
          lapses: typeof item.lapses === 'number' ? item.lapses : 0,
          visualLearning: item.visualLearning?.scene ? item.visualLearning : undefined,
          ...(item.syllableParts?.length && item.kkParts?.length
            ? { syllableParts: item.syllableParts, kkParts: item.kkParts, breakdownWord: item.breakdownWord }
            : {}),
        })).map(migrateCard);
    };

    const InteractiveSentence = ({ text, onWordClick }) => {
      const words = text.split(/(\s+)/);
      return words.map((part, index) => {
        if (/^\s+$/.test(part)) return <span key={index}>{part}</span>;
        const cleanWord = cleanWordToken(part);
        if (!cleanWord) return <span key={index}>{part}</span>;
        return (
          <span key={index} onClick={() => onWordClick(cleanWord)} className="cursor-pointer hover:bg-emerald-100 text-forest-700 font-semibold underline decoration-dotted decoration-emerald-400 px-0.5 rounded transition inline-block active:scale-95">
            {part}
          </span>
        );
      });
    };

    const fetchWithRetry = async (url, options, maxRetries = 3) => {
      let delay = 1000;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);
          const response = await fetch(url, { ...options, signal: controller.signal });
          clearTimeout(timeoutId);

          if (response.ok) return await response.json();
          if (response.status === 429) {
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
            continue;
          }
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData?.error?.message || `HTTP ${response.status}`);
        } catch (err) {
          if (i === maxRetries - 1) throw err;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }
    };

    // --- 圖像學習法元件 ---
    function VisualLearningBlock({ card, apiKey, setLibrary, showToast, compact = false }) {
      const [expanded, setExpanded] = useState(false);
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const reqRef = useRef(0);
      const wordKey = normalizeWordKey(card.word);

      useEffect(() => {
        reqRef.current += 1;
        setExpanded(false);
        setLoading(false);
        const cached = getValidCachedVisualLearning(card);
        setData(cached);
      }, [card.id, card.word]);

      const persistVisual = (cardId, visual) => {
        setLibrary(prev => prev.map(c =>
          c.id === cardId ? { ...c, visualLearning: visual } : c
        ));
      };

      const handleToggle = async () => {
        if (expanded) {
          setExpanded(false);
          return;
        }
        setExpanded(true);
        const cached = getValidCachedVisualLearning(card);
        if (cached) {
          setData(cached);
          return;
        }
        if (!apiKey) {
          showToast('請先至設定分頁輸入 API 金鑰以使用圖像聯想', 'error');
          return;
        }
        const reqId = ++reqRef.current;
        setLoading(true);
        try {
          const visual = await fetchVisualLearning(apiKey, card);
          if (reqId !== reqRef.current) return;
          setData(visual);
          persistVisual(card.id, visual);
        } catch (err) {
          if (reqId !== reqRef.current) return;
          showToast(`圖像聯想載入失敗: ${err.message}`, 'error');
          setExpanded(false);
        } finally {
          if (reqId === reqRef.current) setLoading(false);
        }

      return (

              {loading ? (
                <div className="flex items-center justify-center gap-2 py-3 text-violet-400 text-xs font-medium">
                  <div className="w-4 h-4 border-2 border-violet-300 border-t-violet-600 rounded-full animate-spin" />
                  <span>AI 正在構建圖像場景…</span>

              ) : data?.forWord === wordKey ? (
                <>

                  <p className="text-sm text-slate-700 leading-relaxed font-medium">{data.scene}</p>
                  {data.linkTip && (
                    <p className="text-xs text-violet-600 bg-white/70 rounded-xl px-3 py-2 font-bold leading-relaxed">
                      💡 {data.linkTip}
                    </p>
                  )}
                </>
              ) : null}
            </div>
          )}
        </div>
      );
    }

                   <div className="flex justify-center items-center gap-3">

                  <button onClick={handleContinue} className="flex-1 bg-slate-100 text-slate-700 hover:bg-slate-200 py-4 rounded-2xl font-bold transition-colors">繼續練習</button>

                </div>

    // --- 主程式進入點 ---
    function App() {
      const [activeTab, setActiveTab] = useState('library');
      const [searchTriggerWord, setSearchTriggerWord] = useState(''); 
      const [toast, setToast] = useState(null);
      const [practiceWordObj, setPracticeWordObj] = useState(null);
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [syncStatus, setSyncStatus] = useState('idle');
      const [lastSync, setLastSync] = useState(loadLastFirebaseSync);
      const [autoSync, setAutoSync] = useState(loadAutoSync);
      const [syncConflict, setSyncConflict] = useState(null);
      const [authLoading, setAuthLoading] = useState(false);

      const libraryRef = useRef([]);
      const syncingFromRemoteRef = useRef(false);
      const lastCloudUpdatedAtRef = useRef(0);
      const uploadTimerRef = useRef(null);
      const snapshotUnsubRef = useRef(null);
      const initialSyncDoneRef = useRef(false);

      const [apiKey, setApiKey] = useState(() => {
        try {
          const settings = JSON.parse(localStorage.getItem('auraSettings'));
          if (settings && settings.apiKey) return settings.apiKey;
        } catch (e) {}
        return localStorage.getItem('auravocab_key') || localStorage.getItem('auravocab_apikey') || '';
      });

      const [library, setLibrary] = useState(() => {
        try {
          let list = null;
          const listT008 = localStorage.getItem('auraVocabList');
          if (listT008) list = JSON.parse(listT008);
          else {
            const listT009 = localStorage.getItem('auravocab_lib');
            if (listT009) list = JSON.parse(listT009);
            else {
              const listOld = localStorage.getItem('auravocab_library');
              if (listOld) list = JSON.parse(listOld);
            }
          }
          return Array.isArray(list) ? list.map(migrateCard) : [];
        } catch { return []; }
      });

      useEffect(() => { libraryRef.current = library; }, [library]);

      useEffect(() => { preloadSpeechVoices(); }, []);

      useEffect(() => { 
        localStorage.setItem('auravocab_lib', JSON.stringify(library)); 
        localStorage.setItem('auraVocabList', JSON.stringify(library));
        if (!syncingFromRemoteRef.current) touchLocalLibraryUpdatedAt();
      }, [library]);

      const applyCloudLibrary = (cloudLibrary, cloudUpdatedAt, direction = 'download') => {
        syncingFromRemoteRef.current = true;
        const normalized = normalizeImportedLibrary(cloudLibrary);
        setLibrary(normalized);
        lastCloudUpdatedAtRef.current = cloudUpdatedAt;
        const info = { direction, at: cloudUpdatedAt || Date.now(), count: normalized.length };
        saveLastFirebaseSync(info);
        setLastSync(info);
        setTimeout(() => { syncingFromRemoteRef.current = false; }, 150);
        return normalized.length;
      };

      const startSnapshotListener = (uid) => {
        if (snapshotUnsubRef.current) snapshotUnsubRef.current();
        snapshotUnsubRef.current = getLibraryDocRef(uid).onSnapshot((snap) => {
          if (!snap.exists || !initialSyncDoneRef.current) return;
          const data = snap.data();
          const cloudAt = data.updatedAt || 0;
          if (cloudAt <= lastCloudUpdatedAtRef.current) return;
          const count = applyCloudLibrary(data.library || [], cloudAt, 'download');
          showToast(`已從雲端同步（${count} 筆）`, 'info');
        }, (err) => console.warn('Firestore snapshot error:', err));
      };

      const runInitialSync = async (uid) => {
        let hadConflict = false;
        try {
          setSyncStatus('syncing');
          const cloud = await fetchCloudLibrary(uid);
          const local = libraryRef.current;
          const localCount = local.length;

          if (!cloud || cloud.library.length === 0) {
            if (localCount > 0) {
              const { updatedAt, info } = await uploadLibraryToCloud(uid, local);
              lastCloudUpdatedAtRef.current = updatedAt;
              setLastSync(info);
              showToast(`已上傳字庫至雲端（${localCount} 筆）`, 'success');
            }
          } else if (localCount === 0) {
            const count = applyCloudLibrary(cloud.library, cloud.updatedAt);
            showToast(`已從雲端下載字庫（${count} 筆）`, 'success');
          } else {
            hadConflict = true;
            lastCloudUpdatedAtRef.current = cloud.updatedAt;
            setSyncConflict({
              cloudLibrary: cloud.library,
              cloudUpdatedAt: cloud.updatedAt,
              cloudCount: cloud.library.length,
              localCount,
              localUpdatedAt: getLocalLibraryUpdatedAt(),
            });
          }
        } catch (err) {
          showToast(`同步失敗: ${err.message}`, 'error');
        } finally {
          initialSyncDoneRef.current = true;
          setSyncStatus('idle');
          if (!hadConflict) startSnapshotListener(uid);
        }
      };

      useEffect(() => {
        const fb = initFirebase();
        if (!fb) return;
        const unsubAuth = fb.auth.onAuthStateChanged(async (user) => {
          if (snapshotUnsubRef.current) {
            snapshotUnsubRef.current();
            snapshotUnsubRef.current = null;
          }
          initialSyncDoneRef.current = false;
          setFirebaseUser(user);
          if (!user) {
            lastCloudUpdatedAtRef.current = 0;
            return;
          }
          await runInitialSync(user.uid);
        });
        return () => {
          unsubAuth();
          if (snapshotUnsubRef.current) snapshotUnsubRef.current();
          if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
        };
      }, []);

      useEffect(() => {
        if (!firebaseUser || !autoSync || !initialSyncDoneRef.current) return;
        if (syncingFromRemoteRef.current || syncConflict) return;
        if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
        uploadTimerRef.current = setTimeout(async () => {
          setSyncStatus('syncing');
          try {
            const { updatedAt, info } = await uploadLibraryToCloud(firebaseUser.uid, libraryRef.current);
            lastCloudUpdatedAtRef.current = updatedAt;
            setLastSync(info);
          } catch (err) {
            showToast(`上傳失敗: ${err.message}`, 'error');
          } finally {
            setSyncStatus('idle');
          }
        }, SYNC_DEBOUNCE_MS);
        return () => { if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current); };
      }, [library, firebaseUser, autoSync, syncConflict]);

      const handleGoogleSignIn = async () => {
        const fb = initFirebase();
        if (!fb) return showToast('Firebase 尚未載入，請重新整理', 'error');
        setAuthLoading(true);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await fb.auth.signInWithPopup(provider);
          showToast('Google 登入成功', 'success');
        } catch (err) {
          if (err.code !== 'auth/popup-closed-by-user') {
            showToast(`登入失敗: ${err.message}`, 'error');
          }
        } finally {
          setAuthLoading(false);
        }
      };

      const handleGoogleSignOut = async () => {
        const fb = initFirebase();
        if (!fb) return;
        try {
          await fb.auth.signOut();
          setSyncConflict(null);
          showToast('已登出 Google', 'info');
        } catch (err) {
          showToast(`登出失敗: ${err.message}`, 'error');
        }
      };

      const handleForceSync = async () => {
        if (!firebaseUser) return showToast('請先登入 Google', 'error');
        setSyncStatus('syncing');
        try {
          const { updatedAt, info } = await uploadLibraryToCloud(firebaseUser.uid, libraryRef.current);
          lastCloudUpdatedAtRef.current = updatedAt;
          setLastSync(info);
          showToast(`已上傳至雲端（${info.count} 筆）`, 'success');
        } catch (err) {
          showToast(`上傳失敗: ${err.message}`, 'error');
        } finally {
          setSyncStatus('idle');
        }
      };

      const handleResolveConflict = async (choice) => {
        if (!firebaseUser || !syncConflict) return;
        setSyncStatus('syncing');
        try {
          if (choice === 'cloud') {
            const count = applyCloudLibrary(syncConflict.cloudLibrary, syncConflict.cloudUpdatedAt);
            showToast(`已使用雲端字庫（${count} 筆）`, 'success');
          } else {
            const { updatedAt, info } = await uploadLibraryToCloud(firebaseUser.uid, libraryRef.current);
            lastCloudUpdatedAtRef.current = updatedAt;
            setLastSync(info);
            showToast(`已用本機字庫覆蓋雲端（${info.count} 筆）`, 'success');
          }
          setSyncConflict(null);
          startSnapshotListener(firebaseUser.uid);
        } catch (err) {
          showToast(`同步失敗: ${err.message}`, 'error');
        } finally {
          setSyncStatus('idle');
        }
      };

      const handleAutoSyncChange = (enabled) => {
        setAutoSync(enabled);
        saveAutoSync(enabled);
        showToast(enabled ? '已開啟自動同步' : '已關閉自動同步', 'info');
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const handleSaveApiKey = (key) => {
        const cleanedKey = key.trim().replace(/<\/?[^>]+(>|$)/g, ""); 
        setApiKey(cleanedKey);
        localStorage.setItem('auravocab_key', cleanedKey);
        localStorage.setItem('auraSettings', JSON.stringify({ apiKey: cleanedKey }));
        showToast('金鑰已更新', 'success');
      };

      const handleTriggerSearch = (word) => {
        const cleanWord = cleanWordToken(word);
        if (cleanWord) {
          setSearchTriggerWord(cleanWord);
          setActiveTab('search');
        }
      };

      const startPractice = (wordObj) => {
        setPracticeWordObj(wordObj);
        setActiveTab('practice');
      };

      useEffect(() => {
        document.title = `AuraVocab App ${APP_VERSION}`;
      }, []);

      const dueCount = useMemo(() => getDueCards(library).length, [library]);

      return (
        <div className="flex flex-col min-h-screen pb-safe relative">
          <header className="bg-forest-700 text-white py-4 px-6 shadow-md sticky top-0 z-40 flex items-center justify-between">
            <h1 className="text-xl font-bold tracking-wider flex items-baseline gap-2">
              <Icon name="brain" className="w-6 h-6 animate-pulse text-emerald-300" />
              AuraVocab <span className="text-xs bg-emerald-600 px-2 py-0.5 rounded font-normal self-center ml-1">{APP_VERSION}</span>
            </h1>
          </header>

          <main className="flex-1 overflow-y-auto px-4 py-6 max-w-md mx-auto w-full pb-24">
            <div className={activeTab === 'search' ? 'block' : 'hidden'}>
               <SearchTab apiKey={apiKey} library={library} setLibrary={setLibrary} searchTriggerWord={searchTriggerWord} clearTrigger={() => setSearchTriggerWord('')} showToast={showToast} onTriggerSearch={handleTriggerSearch} />
            </div>
            <div className={activeTab === 'vision' ? 'block' : 'hidden'}>
               <VisionTab apiKey={apiKey} library={library} setLibrary={setLibrary} showToast={showToast} />
            </div>
            <div className={activeTab === 'library' ? 'block' : 'hidden'}>
               <LibraryTab library={library} setLibrary={setLibrary} onTriggerSearch={handleTriggerSearch} showToast={showToast} onPractice={startPractice} />
            </div>
            <div className={activeTab === 'kk' ? 'block' : 'hidden'}>
               <KkTab playAudio={playAudio} library={library} />
            </div>
            <div className={activeTab === 'practice' ? 'block' : 'hidden'}>
               {practiceWordObj && <SinglePracticeView wordObj={practiceWordObj} playAudio={playAudio} onBack={() => setActiveTab('library')} apiKey={apiKey} library={library} setLibrary={setLibrary} showToast={showToast} />}
            </div>
            <div className={activeTab === 'quiz' ? 'block' : 'hidden'}>
               <QuizTab apiKey={apiKey} library={library} setLibrary={setLibrary} showToast={showToast} onTriggerSearch={handleTriggerSearch} active={activeTab === 'quiz'} />
            </div>
            <div className={activeTab === 'settings' ? 'block' : 'hidden'}>
               <SettingsTab
                 apiKey={apiKey}
                 onSaveKey={handleSaveApiKey}
                 library={library}
                 setLibrary={setLibrary}
                 showToast={showToast}
                 firebaseUser={firebaseUser}
                 syncStatus={syncStatus}
                 lastSync={lastSync}
                 autoSync={autoSync}
                 onAutoSyncChange={handleAutoSyncChange}
                 onGoogleSignIn={handleGoogleSignIn}
                 onGoogleSignOut={handleGoogleSignOut}
                 onForceSync={handleForceSync}
                 authLoading={authLoading}
                 syncConflict={syncConflict}
                 onResolveConflict={handleResolveConflict}
               />
            </div>
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] z-40 pb-safe">
            <div className="max-w-md mx-auto flex justify-around items-center h-16 text-[10px] text-slate-500 font-medium">
              <button onClick={() => setActiveTab('search')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'search' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}><Icon name="search" className="w-5 h-5" /><span>查詢</span></button>
              <button onClick={() => setActiveTab('vision')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'vision' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}><Icon name="camera" className="w-5 h-5" /><span>掃圖</span></button>
              <button onClick={() => setActiveTab('library')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'library' || activeTab === 'practice' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}><Icon name="book" className="w-5 h-5" /><span>字庫</span></button>
              <button onClick={() => setActiveTab('kk')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'kk' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}><Icon name="phonetic" className="w-5 h-5" /><span>音標</span></button>
              <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'quiz' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}>
                <div className="relative">
                  <Icon name="brain" className="w-5 h-5" />
                  {dueCount > 0 && <span className="absolute -top-1 -right-1.5 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">{dueCount}</span>}
                </div>
                <span>測驗</span>
              </button>
              <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center justify-center flex-1 h-full gap-0.5 transition ${activeTab === 'settings' ? 'text-forest-700 font-bold scale-105' : 'hover:text-slate-800'}`}><Icon name="settings" className="w-5 h-5" /><span>設定</span></button>
            </div>
          </nav>

          {toast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 animate-fade-in pointer-events-none w-[90%] max-w-sm">
              <div className={`px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold flex items-center justify-center gap-2 ${toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-white border-slate-200 text-slate-800'}`}>
                {toast.type === 'success' && <Icon name="check" className="w-4 h-4 text-emerald-600" />}
                {toast.type === 'error' && <Icon name="error" className="w-4 h-4 shrink-0" />}
                <span className="text-center">{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- KK 音標分頁 ---
    function KkTab({ playAudio, library }) {
      const [section, setSection] = useState('learn');
      const [category, setCategory] = useState('all');
      const [selectedId, setSelectedId] = useState(null);
      const [mastered, setMastered] = useState(loadKkMastered);
      const [quizMode, setQuizMode] = useState('listen');
      const [quiz, setQuiz] = useState(null);
      const [quizScore, setQuizScore] = useState({ correct: 0, total: 0 });
      const [libQuiz, setLibQuiz] = useState(null);
      const [libRevealed, setLibRevealed] = useState(false);

      const filtered = useMemo(() =>
        category === 'all' ? KK_SYMBOLS : KK_SYMBOLS.filter(s => s.type === category),
      [category]);

      const selected = useMemo(() =>
        KK_SYMBOLS.find(s => s.id === selectedId) || null,
      [selectedId]);

      const libraryKkCards = useMemo(() =>
        library.filter(c => extractKkString(c.pronunciation) || c.kkParts?.length),
      [library]);

      const toggleMastered = (id) => {
        setMastered(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          saveKkMastered(next);
          return next;
        });
      };

      const newSymbolQuiz = (mode) => {
        const pool = KK_SYMBOLS;
        const sym = pool[Math.floor(Math.random() * pool.length)];
        if (mode === 'listen') {
          const word = sym.examples[Math.floor(Math.random() * sym.examples.length)];
          const options = pickRandomItems(pool, 3, sym).concat(sym).sort(() => Math.random() - 0.5);
          setQuiz({ mode, sym, word, options, answered: false, picked: null });
        } else {
          const word = sym.examples[0];
          const wrongWords = pickRandomItems(
            pool.filter(s => s.id !== sym.id).flatMap(s => s.examples),
            3,
          );
          const options = [word, ...wrongWords].sort(() => Math.random() - 0.5);
          setQuiz({ mode, sym, word, options, answered: false, picked: null });
        }
        setQuizScore(s => ({ ...s, total: s.total + 1 }));
      };

      const handleQuizPick = (option) => {
        if (!quiz || quiz.answered) return;
        const isCorrect = quiz.mode === 'listen'
          ? option.id === quiz.sym.id
          : option === quiz.word;
        if (isCorrect) {
          setQuizScore(s => ({ ...s, correct: s.correct + 1 }));
          setMastered(prev => {
            const next = new Set(prev);
            next.add(quiz.sym.id);
            saveKkMastered(next);
            return next;
          });
        }
        setQuiz(q => ({ ...q, answered: true, picked: option, isCorrect }));
      };

      const newLibQuiz = () => {
        if (libraryKkCards.length === 0) return;
        const card = libraryKkCards[Math.floor(Math.random() * libraryKkCards.length)];
        const kk = extractKkString(card.pronunciation) ||
          (card.kkParts?.length ? card.kkParts.join('') : '');
        setLibQuiz({ card, kk });
        setLibRevealed(false);
      };

      useEffect(() => {
        if (section === 'quiz' && !quiz) newSymbolQuiz(quizMode);
      }, [section]);

      useEffect(() => {
        if (section === 'library' && libraryKkCards.length > 0 && !libQuiz) newLibQuiz();
      }, [section, libraryKkCards.length]);

      useEffect(() => {
        if (section !== 'quiz' || !quiz || quiz.mode !== 'listen' || quiz.answered) return;
        const timer = setTimeout(() => playAudio(quiz.word), 400);
        return () => clearTimeout(timer);
      }, [section, quiz?.word, quiz?.mode, quiz?.answered]);

      const typeLabel = { vowel: '母音', diphthong: '雙母音', consonant: '子音' };

      return (
        <div className="space-y-4 animate-fade-in mt-4">
          <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm">
            <h2 className="text-lg font-bold text-forest-800 flex items-center gap-2">
              <Icon name="phonetic" className="w-5 h-5 text-indigo-600" />
              KK 音標學習
            </h2>
            <p className="text-xs text-slate-400 mt-2 leading-relaxed">
              KK 音標是英文的「發音符號」，共 41 個。看到字卡或測驗裡的 KK[...] 時，可以回來對照。慢慢學，不用一次記完。
            </p>
            <div className="flex gap-2 mt-3 text-[11px]">
              <span className="bg-indigo-50 text-indigo-700 px-2 py-1 rounded-full font-bold">已熟悉 {mastered.size}/{KK_SYMBOLS.length}</span>
              <span className="bg-slate-50 text-slate-500 px-2 py-1 rounded-full">例：ship /ʃɪp/ ≠ sheep /ʃip/</span>
            </div>
          </div>

          <div className="flex bg-white rounded-2xl p-1 border border-slate-100 shadow-sm">
            {[
              { id: 'learn', label: '符號表' },
              { id: 'quiz', label: '練習' },
              { id: 'library', label: '字庫音標' },
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setSection(tab.id)}
                className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition ${section === tab.id ? 'bg-forest-700 text-white shadow' : 'text-slate-500 hover:text-slate-700'}`}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {section === 'learn' && (
            <div className="space-y-4">
              <div className="flex gap-1.5 flex-wrap">
                {KK_CATEGORIES.map(cat => (
                  <button
                    key={cat.id}
                    onClick={() => { setCategory(cat.id); setSelectedId(null); }}
                    className={`px-3 py-1.5 rounded-full text-xs font-bold transition ${category === cat.id ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}
                  >
                    {cat.label}
                    {cat.id !== 'all' && ` (${KK_SYMBOLS.filter(s => s.type === cat.id).length})`}
                    {cat.id === 'all' && ` (${KK_SYMBOLS.length})`}
                  </button>
                ))}
              </div>

              <div className="grid grid-cols-4 gap-2">
                {filtered.map(sym => (
                  <button
                    key={sym.id}
                    onClick={() => setSelectedId(sym.id === selectedId ? null : sym.id)}
                    className={`relative rounded-xl py-3 px-1 text-center transition active:scale-95 border ${
                      selectedId === sym.id ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' :
                      mastered.has(sym.id) ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                      'bg-white border-slate-100 text-slate-700 hover:border-indigo-200'
                    }`}
                  >
                    <span className="font-mono text-sm font-bold block">{sym.symbol}</span>
                    <span className={`text-[9px] block mt-0.5 ${selectedId === sym.id ? 'text-indigo-100' : 'text-slate-400'}`}>{typeLabel[sym.type]}</span>
                    {mastered.has(sym.id) && selectedId !== sym.id && (
                      <span className="absolute top-1 right-1 text-emerald-500 text-[10px]">✓</span>
                    )}
                  </button>
                ))}
              </div>

              {selected && (
                <div className="bg-white rounded-3xl p-5 border border-indigo-100 shadow-sm space-y-4 animate-fade-in">
                  <div className="text-center">
                    <span className="font-mono text-4xl font-bold text-indigo-700">{selected.symbol}</span>
                    <p className="text-sm font-bold text-slate-600 mt-1">{selected.name}</p>
                    <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{typeLabel[selected.type]}</span>
                  </div>
                  <p className="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-xl p-3">{selected.hint}</p>
                  <div>
                    <p className="text-xs font-bold text-slate-500 mb-2">例字（點擊聽發音）</p>
                    <div className="flex flex-wrap gap-2">
                      {selected.examples.map(word => (
                        <button
                          key={word}
                          onClick={() => playAudio(word)}
                          className="flex items-center gap-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-800 px-3 py-2 rounded-xl text-sm font-bold transition active:scale-95"
                        >
                          <Icon name="speaker" className="w-4 h-4" />
                          {word}
                        </button>
                      ))}
                    </div>
                  </div>
                  {selected.confuseNote && (
                    <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800 leading-relaxed">
                      <span className="font-bold">易混淆：</span>{selected.confuseNote}
                      {selected.confuseWith && <span className="font-mono ml-1">{selected.confuseWith}</span>}
                    </div>
                  )}
                  <button
                    onClick={() => toggleMastered(selected.id)}
                    className={`w-full py-3 rounded-xl text-xs font-bold transition active:scale-95 ${
                      mastered.has(selected.id) ? 'bg-slate-100 text-slate-600' : 'bg-emerald-600 text-white hover:bg-emerald-500'
                    }`}
                  >
                    {mastered.has(selected.id) ? '取消「已熟悉」標記' : '✓ 標記為已熟悉'}
                  </button>
                </div>
              )}
            </div>
          )}

          {section === 'quiz' && (
            <div className="space-y-4">
              <div className="flex gap-2">
                {[
                  { id: 'listen', label: '聽音選符號' },
                  { id: 'symbol', label: '看符號選例字' },
                ].map(m => (
                  <button
                    key={m.id}
                    onClick={() => { setQuizMode(m.id); setQuiz(null); newSymbolQuiz(m.id); }}
                    className={`flex-1 py-2 rounded-xl text-xs font-bold border transition ${quizMode === m.id ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'bg-white border-slate-200 text-slate-500'}`}
                  >
                    {m.label}
                  </button>
                ))}
              </div>
              {quizScore.total > 0 && (
                <p className="text-center text-xs text-slate-500">答對 {quizScore.correct} / {quizScore.total}</p>
              )}
              {quiz && (
                <div className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm space-y-4">
                  {quiz.mode === 'listen' ? (
                    <div className="text-center space-y-3">
                      <p className="text-xs font-bold text-slate-500">聽例字發音，選出對應的 KK 符號</p>
                      <button
                        onClick={() => playAudio(quiz.word)}
                        className="mx-auto flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-2xl font-bold text-lg transition active:scale-95 shadow-md"
                      >
                        <Icon name="speaker" className="w-6 h-6" />
                        播放「{quiz.word}」
                      </button>
                    </div>
                  ) : (
                    <div className="text-center space-y-2">
                      <p className="text-xs font-bold text-slate-500">這個符號的例字是？</p>
                      <span className="font-mono text-5xl font-bold text-indigo-700">{quiz.sym.symbol}</span>
                    </div>
                  )}
                  <div className="grid grid-cols-2 gap-2">
                    {(quiz.mode === 'listen' ? quiz.options : quiz.options).map((opt, i) => {
                      const label = quiz.mode === 'listen' ? opt.symbol : opt;
                      const isPicked = quiz.mode === 'listen' ? quiz.picked?.id === opt.id : quiz.picked === opt;
                      const isAnswer = quiz.mode === 'listen' ? opt.id === quiz.sym.id : opt === quiz.word;
                      let cls = 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-indigo-50';
                      if (quiz.answered) {
                        if (isAnswer) cls = 'bg-emerald-50 border-emerald-400 text-emerald-800 ring-2 ring-emerald-200';
                        else if (isPicked) cls = 'bg-red-50 border-red-300 text-red-700';
                        else cls = 'bg-slate-50 border-slate-100 text-slate-400';
                      } else if (isPicked) cls = 'bg-indigo-50 border-indigo-300 text-indigo-800';
                      return (
                        <button
                          key={i}
                          onClick={() => handleQuizPick(opt)}
                          disabled={quiz.answered}
                          className={`py-3 px-2 rounded-xl text-sm font-bold border transition active:scale-95 disabled:active:scale-100 ${cls}`}
                        >
                          {label}
                        </button>
                      );
                    })}
                  </div>
                  {quiz.answered && (
                    <div className="space-y-2">
                      <p className={`text-center text-sm font-bold ${quiz.isCorrect ? 'text-emerald-600' : 'text-red-600'}`}>
                        {quiz.isCorrect ? '✓ 答對了！' : `✗ 正確：${quiz.mode === 'listen' ? quiz.sym.symbol : quiz.word}`}
                      </p>
                      {!quiz.isCorrect && (
                        <button onClick={() => playAudio(quiz.word)} className="w-full text-xs text-indigo-600 font-bold underline">
                          再聽一次「{quiz.word}」
                        </button>
                      )}
                      <button
                        onClick={() => newSymbolQuiz(quizMode)}
                        className="w-full bg-forest-700 hover:bg-forest-600 text-white py-3 rounded-xl text-sm font-bold transition active:scale-95"
                      >
                        下一題
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {section === 'library' && (
            <div className="space-y-4">
              {libraryKkCards.length === 0 ? (
                <div className="bg-white rounded-3xl p-8 border border-slate-100 text-center text-sm text-slate-400">
                  字庫中尚無含 KK 音標的單字。<br />請先透過查詢或掃圖加入單字。
                </div>
              ) : libQuiz && (
                <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm space-y-4 text-center">
                  <p className="text-xs font-bold text-slate-500">你的字庫音標練習</p>
                  <p className="text-3xl font-bold text-forest-800">{libQuiz.card.word}</p>
                  <p className="text-sm text-slate-500">{getTranslation(libQuiz.card)}</p>
                  <button onClick={() => playAudio(libQuiz.card.word)} className="mx-auto flex items-center gap-2 text-indigo-600 font-bold text-sm">
                    <Icon name="speaker" className="w-4 h-4" /> 聽發音
                  </button>
                  {!libRevealed ? (
                    <button
                      onClick={() => setLibRevealed(true)}
                      className="w-full bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-800 py-4 rounded-2xl font-bold transition active:scale-95"
                    >
                      顯示 KK 音標
                    </button>
                  ) : (
                    <div className="bg-slate-50 rounded-2xl p-4 space-y-2 animate-fade-in">
                      <p className="font-mono text-xl font-bold text-indigo-700">
                        KK[{libQuiz.kk || '—'}]
                      </p>
                      {libQuiz.card.syllableParts?.length > 0 && (
                        <p className="text-xs text-slate-500">
                          音節：{formatSyllableParts(libQuiz.card.syllableParts)}
                          {libQuiz.card.kkParts?.length ? ` · KK：${formatSyllableParts(libQuiz.card.kkParts)}` : ''}
                        </p>
                      )}
                    </div>
                  )}
                  <button
                    onClick={newLibQuiz}
                    className="w-full bg-forest-700 hover:bg-forest-600 text-white py-3 rounded-xl text-sm font-bold transition active:scale-95"
                  >
                    下一個字（共 {libraryKkCards.length} 筆有音標）
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // --- 1. 查詢分頁 ---
    function SearchTab({ apiKey, library, setLibrary, searchTriggerWord, clearTrigger, showToast, onTriggerSearch }) {
      const [searchText, setSearchText] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);

      const runSearch = async (wordToSearch) => {
        const trimmed = wordToSearch.trim();
        if (!trimmed) return;
        if (!apiKey) return showToast('請先至設定分頁輸入您的 API 金鑰！', 'error');

        setLoading(true);
        setResult(null);
        try {
          const prompt = `您是一個專業的高效英語翻譯官。請精準、簡明地翻譯這個單字或片語: "${trimmed}"。請僅以 JSON 格式回傳，格式必須嚴格如下：
{
  "word": "${trimmed}",
  "pronunciation": "KK音標",
  "translation": "極簡精準繁體中文翻譯",
  "exampleEn": "一行實用英文例句",
  "exampleZh": "例句的繁體中文翻譯",
  "type": "word 或 phrase"
}`;
          const responseData = await fetchWithRetry(
            `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
            }
          );
          const parsed = cleanJsonString(responseData.candidates[0].content.parts[0].text);
          setResult(parsed);
          playAudio(parsed.word);
        } catch (err) {
          showToast(`查詢失敗: ${err.message}`, 'error');
        } finally { setLoading(false); }
      };

      useEffect(() => {
        if (!searchTriggerWord) return;
        const trimmed = searchTriggerWord.trim();
        setSearchText(trimmed);
        clearTrigger();
        runSearch(trimmed);
      }, [searchTriggerWord, apiKey]);

      const handleSearch = (e) => {
        if (e) e.preventDefault();
        runSearch(searchText);
      };

      const handleSave = () => {
        if (!result) return;
        if (library.some(card => card.word.toLowerCase() === result.word.toLowerCase())) return showToast('已經在庫中囉！', 'error');
        setLibrary(prev => [{ id: Date.now().toString(), ...result, addedAt: Date.now(), ...createSrsFields() }, ...prev]);
        showToast('已成功存入單字庫！', 'success');
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <form onSubmit={handleSearch} className="flex gap-2">
            <input type="text" value={searchText} onChange={(e) => setSearchText(e.target.value)} placeholder="請輸入英文單字或片語..." className="flex-1 px-4 py-3 border border-slate-200 rounded-xl shadow-sm focus:outline-none focus:border-forest-600 font-medium" />
            <button id="search-trigger-btn" type="submit" disabled={loading} className="bg-forest-700 hover:bg-forest-600 text-white font-bold px-6 py-3 rounded-xl shadow transition active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
              {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="search" className="w-5 h-5" /><span>查詢</span></>}
            </button>
          </form>

          {result && (
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
              <div className="flex justify-between items-start">
                <div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <h2 className="text-2xl font-bold text-forest-800 tracking-wide">{result.word}</h2>
                    <button onClick={() => playAudio(result.word)} className="text-forest-600 hover:text-forest-700 p-1.5 bg-forest-50 hover:bg-forest-100 rounded-full transition active:scale-90"><Icon name="speaker" className="w-5 h-5" /></button>
                  </div>
                  {result.pronunciation && <span className="text-sm font-medium text-slate-400 font-mono inline-block mt-1">{result.pronunciation}</span>}
                </div>
                <span className="text-xs font-semibold px-2 py-1 bg-emerald-50 text-emerald-700 rounded-lg">{result.type === 'phrase' ? '片語' : '單字'}</span>
              </div>
              <div className="border-t border-slate-100 pt-4 space-y-3">
                <div><span className="text-xs text-slate-400 font-bold tracking-wider">中文翻譯</span><p className="text-lg font-bold text-slate-700 mt-1">{getTranslation(result)}</p></div>
                {result.exampleEn && (
                  <div className="space-y-2">
                    <span className="text-xs text-slate-400 font-bold tracking-wider">例句</span>
                    <div className="flex items-start justify-between gap-2">
                      <p className="text-sm text-slate-600 leading-relaxed font-medium"><InteractiveSentence text={result.exampleEn} onWordClick={onTriggerSearch} /></p>
                      <button onClick={() => playAudio(result.exampleEn)} className="text-emerald-700 hover:text-emerald-800 p-1 bg-emerald-50 rounded-lg transition active:scale-90 flex-shrink-0"><Icon name="speaker" className="w-4 h-4" /></button>
                    </div>
                    {result.exampleZh && <p className="text-xs font-bold text-slate-400">{result.exampleZh}</p>}
                  </div>
                )}
              </div>
              <button onClick={handleSave} className="w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-800 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition active:scale-95"><Icon name="doubleCheck" className="w-5 h-5 text-emerald-600" /><span>儲存到單字庫</span></button>
            </div>
          )}
        </div>
      );
    }

    // --- 2. 圖片萃取分頁 ---
    function VisionTab({ apiKey, library, setLibrary, showToast }) {
      const [loading, setLoading] = useState(false);
      const [images, setImages] = useState([]);
      const [ocrMode, setOcrMode] = useState('smart');
      const [scannedResults, setScannedResults] = useState([]);
      const [skippedCount, setSkippedCount] = useState(0);
      const [cacheHitCount, setCacheHitCount] = useState(0);

      const handleImageChange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        e.target.value = '';
        try {
          const results = await Promise.all(files.map(file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve({
              file,
              preview: reader.result,
              base64: reader.result.split(',')[1],
              mimeType: getImageMimeType(file),
            });
            reader.readAsDataURL(file);
          })));
          const withHash = await Promise.all(results.map(async r => ({
            ...r,
            hash: await hashBase64Image(r.base64),
          })));
          setImages(prev => {
            const seen = new Set(prev.map(i => i.hash));
            const added = [];
            let dup = 0;
            for (const img of withHash) {
              if (seen.has(img.hash)) { dup++; continue; }
              seen.add(img.hash);
              added.push(img);
            }
            if (dup > 0) showToast(`已跳過 ${dup} 張重複圖片`, 'info');
            return [...prev, ...added];
          });
        } catch {
          showToast('讀取圖片失敗', 'error');
        }
      };

      const handleRemoveImage = (index) => setImages(prev => prev.filter((_, i) => i !== index));

      const dedupeItems = (items) => {
        const seen = new Set();
        return items.filter(item => {
          const key = (item.word || '').trim().toLowerCase();
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      };

      const buildCardFromItem = (item, index) => ({
        ...item,
        id: `${Date.now()}_${index}`,
        type: item.type === 'phrase' ? 'phrase' : 'word',
        addedAt: Date.now(),
        ...createSrsFields(),
      });

      const scanImage = async (img, prompt) => {
        const responseData = await fetchWithRetry(
          `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: img.mimeType, data: img.base64 } }] }], generationConfig: { responseMimeType: "application/json" } }) }
        );
        return cleanJsonString(responseData.candidates[0].content.parts[0].text);
      };

      const scanImagesWithCache = async () => {
        const prompt = getOcrPrompt(ocrMode);
        const cache = loadOcrCache();
        const allItems = [];
        let cacheHits = 0;

        for (const img of images) {
          if (!img.hash) continue;
          const cacheKey = `${ocrMode}:${img.hash}`;
          const cached = cache[cacheKey];
          if (cached?.items) {
            cacheHits++;
            allItems.push(...cached.items);
            continue;
          }
          const parsed = await scanImage(img, prompt);
          const items = normalizeScannedItems(parsed, ocrMode);
          cache[cacheKey] = { items, savedAt: Date.now() };
          allItems.push(...items);
        }

        saveOcrCache(cache);
        return { allItems, cacheHits };
      };

      const generateWordExamples = async (words) => {
        if (!words.length) return {};
        const prompt = `您是英語教學助理。以下單字已有翻譯與音標，請「僅為每個單字各補充一組實用例句」，不要修改 word、translation、pronunciation。
單字清單：${JSON.stringify(words.map(w => ({ word: w.word, translation: getTranslation(w), pronunciation: w.pronunciation || '' })))}
僅回傳 JSON：{ "items": [ { "word": "與清單完全一致", "exampleEn": "英文例句", "exampleZh": "例句繁體中文" } ] }`;

        const responseData = await fetchWithRetry(
          `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) }
        );
        const parsed = cleanJsonString(responseData.candidates[0].content.parts[0].text);
        const map = {};
        (parsed?.items || []).forEach(row => {
          if (row?.word) map[row.word.trim().toLowerCase()] = row;
        });
        return map;
      };

      const handleScan = async () => {
        if (!images.length) return;
        if (!apiKey) return showToast('請先至設定分頁輸入您的 API 金鑰！', 'error');

        setLoading(true);
        setSkippedCount(0);
        setCacheHitCount(0);
        try {
          const { allItems, cacheHits } = await scanImagesWithCache();
          setCacheHitCount(cacheHits);

          let extracted = dedupeItems(allItems);
          const newItems = extracted.filter(item => !isWordInLibrary(item.word, library));
          const skipped = extracted.length - newItems.length;
          setSkippedCount(skipped);

          const buildScanToast = (main) => {
            const extras = [];
            if (cacheHits > 0) extras.push(`${cacheHits} 張快取`);
            if (skipped > 0) extras.push(`${skipped} 個字庫重複`);
            return extras.length ? `${main}（${extras.join('、')}）` : main;
          };

          if (newItems.length === 0) {
            setScannedResults([]);
            setImages([]);
            if (cacheHits > 0 && skipped > 0) {
              showToast(buildScanToast('掃描完成！全部來自快取且已在字庫'), 'info');
            } else if (skipped > 0) {
              showToast(buildScanToast('掃描完成！字詞已在字庫'), 'info');
            } else if (cacheHits > 0) {
              showToast(buildScanToast('掃描完成，但未發現有效字詞'), 'info');
            } else {
              showToast('掃描完成，但未發現有效字詞', 'error');
            }
            return;
          }

          const wordsNeedingExamples = newItems.filter(i => i.type === 'word' && !i.exampleEn?.trim());
          let results = newItems;
          if (wordsNeedingExamples.length > 0) {
            const exampleMap = await generateWordExamples(wordsNeedingExamples);
            results = newItems.map(item => {
              if (item.type !== 'word' || item.exampleEn?.trim()) return item;
              const ex = exampleMap[item.word.trim().toLowerCase()];
              return ex ? { ...item, exampleEn: ex.exampleEn || '', exampleZh: ex.exampleZh || '' } : item;
            });
          }

          setScannedResults(results);
          setImages([]);
          const wordCount = results.filter(i => i.type === 'word').length;
          const phraseCount = results.filter(i => i.type === 'phrase').length;
          let msg;
          if (ocrMode === 'smart') {
            msg = buildScanToast(`智慧掃描完成！${wordCount} 單字、${phraseCount} 片語`);
          } else {
            const label = ocrMode === 'phrase' ? '片語' : '單字';
            msg = buildScanToast(`萃取完成！共發現 ${results.length} 個${label}`);
          }
          showToast(msg, 'success');
        } catch (err) {
          showToast(`掃描中斷: ${err.message}`, 'error');
        } finally { setLoading(false); }
      };

      const handleSaveScanned = (item, index) => {
        if (isWordInLibrary(item.word, library)) return showToast('已在庫中囉！', 'error');
        setLibrary(prev => [buildCardFromItem(item, index), ...prev]);
        setScannedResults(prev => prev.filter((_, i) => i !== index));
        showToast('已成功存入單字庫！', 'success');
      };

      const handleSaveAll = () => {
        const toSave = scannedResults.filter(item => !isWordInLibrary(item.word, library));
        if (toSave.length === 0) return showToast('沒有可儲存的新字詞', 'error');
        setLibrary(prev => [...toSave.map((item, i) => buildCardFromItem(item, i)), ...prev]);
        setScannedResults([]);
        showToast(`已成功存入 ${toSave.length} 個字詞！`, 'success');
      };

      const handleToggleScannedType = (index) => {
        setScannedResults(prev => prev.map((item, i) => {
          if (i !== index) return item;
          const newType = item.type === 'phrase' ? 'word' : 'phrase';
          return { ...item, type: newType };
        }));
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
            <div className="flex items-center justify-between gap-2">
              <span className="text-sm font-bold text-slate-500 shrink-0">掃描模式</span>
              <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                <button onClick={() => setOcrMode('smart')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'smart' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🧠 智慧</button>
                <button onClick={() => setOcrMode('word')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'word' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🔍 單字</button>
                <button onClick={() => setOcrMode('phrase')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'phrase' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🔗 片語</button>
              </div>
            </div>
            <p className="text-xs text-slate-400 leading-relaxed">
              {ocrMode === 'smart'
                ? '智慧掃描：自動辨識綠色片語卡或白色單字卡，分類擷取；單字自動補例句，片語保留原例句。相同圖片會使用快取，不重複呼叫 API。'
                : ocrMode === 'phrase'
                  ? '片語模式：適用深綠色片語卡（含翻譯與例句），直接抄寫入庫，不另補例句。相同圖片會使用快取。'
                  : '單字模式：適用白色單字卡（含音標與釋義、無例句），掃描後 AI 自動補充例句。相同圖片會使用快取。'}
            </p>
          </div>
          <div className="border-2 border-dashed border-slate-200 bg-white rounded-2xl p-6 flex flex-col items-center justify-center min-h-[160px] relative">
            <input type="file" multiple accept="image/*" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
            <Icon name="camera" className="w-10 h-10 text-slate-300 mb-2" />
            <p className="text-sm font-bold text-slate-500">點擊上傳{ocrMode === 'smart' ? '' : ocrMode === 'phrase' ? '片語' : '單字'}截圖</p>
            {ocrMode === 'smart' && <p className="text-xs text-slate-400 mt-1">可混合上傳單字卡與片語卡</p>}
          </div>
          {images.length > 0 && (
            <div className="grid grid-cols-4 gap-2">
              {images.map((img, idx) => (
                <div key={img.hash || idx} className="relative aspect-square rounded-xl overflow-hidden border border-slate-100"><img src={img.preview} className="object-cover w-full h-full" /><button onClick={() => handleRemoveImage(idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-0.5 shadow"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg></button></div>
              ))}
            </div>
          )}
          {images.length > 0 && (
            <button onClick={handleScan} disabled={loading} className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-3.5 rounded-xl shadow transition">
              {loading ? <div className="mx-auto w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : ocrMode === 'smart' ? '開始智慧掃描' : '開始高效掃描'}
            </button>
          )}
          {scannedResults.length > 0 && (
            <div className="space-y-4">
              <div className="flex items-center justify-between gap-2">
                <h3 className="text-sm font-bold text-slate-400 tracking-wider">💡 待審核內容 ({scannedResults.length})</h3>
                <button onClick={handleSaveAll} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 shadow transition active:scale-95 shrink-0">
                  <Icon name="doubleCheck" className="w-4 h-4" /><span>一鍵全部儲存</span>
                </button>
              </div>
              {(skippedCount > 0 || cacheHitCount > 0) && (
                <p className="text-xs font-medium text-slate-400 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2">
                  {cacheHitCount > 0 && <>已使用快取 {cacheHitCount} 張（未呼叫 API）</>}
                  {cacheHitCount > 0 && skippedCount > 0 && ' · '}
                  {skippedCount > 0 && <>已跳過 {skippedCount} 個字庫重複</>}
                </p>
              )}
              {scannedResults.map((item, idx) => (
                <div key={idx} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm space-y-3">
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-1 flex-wrap">
                        <h4 className="text-lg font-bold text-slate-800">{item.word}</h4>
                        <button onClick={() => playAudio(item.word)} className="p-1 hover:bg-slate-100 rounded-full transition"><Icon name="speaker" className="w-4 h-4 text-forest-700" /></button>
                        <button
                          onClick={() => handleToggleScannedType(idx)}
                          title="點擊切換單字／片語"
                          className={`text-[10px] font-bold px-2 py-0.5 rounded-full transition active:scale-95 ${item.type === 'phrase' ? 'bg-amber-50 text-amber-700 hover:bg-amber-100' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                        >
                          {item.type === 'phrase' ? '片語' : '單字'}
                        </button>
                      </div>
                      {item.pronunciation && <span className="text-xs font-mono text-slate-400">{item.pronunciation}</span>}
                    </div>
                    <button onClick={() => handleSaveScanned(item, idx)} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 shadow"><Icon name="check" className="w-3.5 h-3.5" /><span>儲存</span></button>
                  </div>
                  <div><span className="text-xs text-slate-400 font-semibold block">中文翻譯</span><p className="text-sm font-bold text-slate-700 mt-0.5">{getTranslation(item)}</p></div>
                  {item.exampleEn && (
                    <div className="border-t border-slate-50 pt-2 space-y-1">
                      <span className="text-xs text-slate-400 font-semibold block">例句</span>
                      <p className="text-sm text-slate-600 leading-relaxed">{item.exampleEn}</p>
                      {item.exampleZh && <p className="text-xs font-bold text-slate-400">{item.exampleZh}</p>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- 3. 字庫與即點即查分頁 ---
    function LibraryTab({ library, setLibrary, onTriggerSearch, showToast, onPractice }) {
      const [filter, setFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');

      const handleDelete = (id) => {
        setLibrary(prev => prev.filter(card => card.id !== id));
        showToast('字詞已成功刪除！', 'success');
      };

      const handleToggleType = (id) => {
        setLibrary(prev => prev.map(card => {
          if (card.id !== id) return card;
          const newType = card.type === 'phrase' ? 'word' : 'phrase';
          return { ...card, type: newType };
        }));
        const card = library.find(c => c.id === id);
        const newType = card?.type === 'phrase' ? 'word' : 'phrase';
        showToast(`已改為${newType === 'phrase' ? '片語' : '單字'}`, 'success');
      };

      const filteredList = useMemo(() => {
        return library.filter(card => {
          const matchesFilter = filter === 'all' || card.type === filter;
          const matchesSearch = card.word.toLowerCase().includes(searchTerm.toLowerCase()) || getTranslation(card).includes(searchTerm);
          return matchesFilter && matchesSearch;
        });
      }, [library, filter, searchTerm]);

      return (
        <div className="space-y-4 animate-fade-in">
          <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="搜尋庫中的單字或中文..." className="w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm focus:outline-none focus:border-forest-600 font-medium" />
          <div className="flex gap-2 justify-center">
            {['all', 'word', 'phrase'].map(type => (
              <button key={type} onClick={() => setFilter(type)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition ${filter === type ? 'bg-forest-700 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                {type === 'all' ? '全部' : type === 'word' ? '單字' : '片語'}
              </button>
            ))}
          </div>
          <div className="space-y-4">
            {filteredList.length === 0 ? <div className="text-center py-12 text-slate-400 font-medium">空空的...</div> : (
              filteredList.map(card => (
                <div key={card.id} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm space-y-4 relative overflow-hidden">
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-1 flex-wrap">
                        <h4 className="text-xl font-bold text-forest-800 tracking-wide">{card.word}</h4>
                        <button onClick={() => playAudio(card.word)} className="text-forest-600 hover:text-forest-700 p-1 bg-forest-50 hover:bg-forest-100 rounded-full transition active:scale-90"><Icon name="speaker" className="w-4 h-4" /></button>
                      </div>
                      {card.pronunciation && <p className="text-xs font-mono text-slate-400 mt-0.5">{card.pronunciation}</p>}
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] font-bold px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full">{STATE_LABELS[migrateCard(card).state] || '新卡'}</span>
                      <button
                        onClick={() => handleToggleType(card.id)}
                        title="點擊切換單字／片語"
                        className={`text-[10px] font-bold px-2 py-0.5 rounded-full transition active:scale-95 ${card.type === 'phrase' ? 'bg-amber-50 text-amber-700 hover:bg-amber-100' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                      >
                        {card.type === 'phrase' ? '片語' : '單字'}
                      </button>
                      <button onClick={() => handleDelete(card.id)} className="text-red-400 hover:text-red-500 p-1.5 bg-red-50 rounded-lg transition active:scale-90"><Icon name="trash" className="w-4 h-4" /></button>
                    </div>
                  </div>
                  <div className="bg-forest-50/50 p-3 rounded-xl border border-forest-50"><p className="text-base font-bold text-slate-700">{getTranslation(card)}</p></div>
                  {card.exampleEn && (
                    <div className="border-t border-slate-100 pt-3 space-y-2">
                      <div className="flex items-start justify-between gap-1">
                        <div className="text-sm text-slate-600 leading-relaxed font-medium"><InteractiveSentence text={card.exampleEn} onWordClick={onTriggerSearch} /></div>
                        <button onClick={() => playAudio(card.exampleEn)} className="text-emerald-700 hover:text-emerald-800 p-1 bg-emerald-50 rounded-lg transition active:scale-90 flex-shrink-0" title="朗讀整句"><Icon name="speaker" className="w-4 h-4" /></button>
                      </div>
                      <p className="text-xs font-bold text-slate-400">{card.exampleZh}</p>
                    </div>
                  )}
                  {/* 新增的單字庫「練習」按鈕 */}
                  <div className="border-t border-slate-50 pt-2 flex justify-end">
                    <button onClick={() => onPractice(card)} className="px-4 py-1.5 text-xs font-bold text-forest-700 bg-forest-50 hover:bg-forest-100 rounded-lg transition active:scale-95 flex items-center gap-1.5">
                      <Icon name="edit" className="w-3.5 h-3.5" /> 練習
                    </button>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // --- 4. 🧠 測驗與 Anki SRS (QuizTab) ---
    function QuizTab({ apiKey, library, setLibrary, showToast, onTriggerSearch, active }) {
      const [dueCards, setDueCards] = useState([]);
      const [currentCard, setCurrentCard] = useState(null);
      const [quizPhase, setQuizPhase] = useState(1);
      const [userInput, setUserInput] = useState('');
      const [isCorrect, setIsCorrect] = useState(null);
      const [wrongAwaitingChoice, setWrongAwaitingChoice] = useState(false);
      const [correctionCardId, setCorrectionCardId] = useState(null);
      const [wordBreakdown, setWordBreakdown] = useState(null);
      const [breakdownLoading, setBreakdownLoading] = useState(false);
      const [breakdownCardId, setBreakdownCardId] = useState(null);
      const spellingInputRef = useRef(null);
      const breakdownReqRef = useRef(0);
      const isCorrectionRound = correctionCardId !== null;

      const normalizeSpelling = (s) =>
        (s || '').trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, '');

      const resetQuizPhase = () => {
        setQuizPhase(1);
        setUserInput('');
        setIsCorrect(null);
        setWrongAwaitingChoice(false);
        breakdownReqRef.current += 1;
        setWordBreakdown(null);
        setBreakdownCardId(null);
        setBreakdownLoading(false);
      };

      const resetForNextCard = () => {
        resetQuizPhase();
        setCorrectionCardId(null);
      };

      const advanceToNextCard = () => {
        const prevId = currentCard.id;
        setCorrectionCardId(null);
        const activeDue = getDueCards(library);
        setDueCards(activeDue);
        setCurrentCard(pickNextCard(activeDue, prevId));
