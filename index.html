<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AuraVocab App</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @supports (-webkit-touch-callout: none) {
      .h-dvh { height: -webkit-fill-available; }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- SVG 圖示庫 ---
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        Search: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
        Book: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`,
        Brain: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/></svg>`,
        Settings: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
        Volume2: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
        CheckCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>`,
        Trash2: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
        AlertCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
        Loader2: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
        Camera: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`,
        UploadCloud: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>`,
        PlusCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>`,
        Key: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>`,
        PartyPopper: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"/><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.91 9 5.52 9 6.23V7"/><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z"/></svg>`,
        Volume1: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`
      };
      return <div dangerouslySetInnerHTML={{ __html: icons[name] }} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
    };

    // ==========================================
    // 系統常數 & 共用函式
    // ==========================================
    const TEXT_MODEL = "gemini-2.5-flash";
    
    const initAnkiParams = (wordObj) => ({
      ...wordObj,
      repetition: 0,
      interval: 0,
      easeFactor: 2.5,
      nextReview: Date.now(), 
      mastered: false, 
      addedAt: Date.now()
    });

    const MOCK_VOCAB = [
      initAnkiParams({ word: "resilience", ipa: "/rɪˈzɪliəns/", pos: "noun", zh: "韌性；恢復力", exampleEn: "She showed great resilience in the face of adversity.", exampleZh: "她在逆境中展現了極大的韌性。" })
    ];

    // ==========================================
    // 主應用程式 App Component
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('search');
      
      const [vocabList, setVocabList] = useState(() => {
        const saved = localStorage.getItem('auraVocabList');
        return saved ? JSON.parse(saved) : MOCK_VOCAB;
      });

      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem('auraSettings');
        return saved ? JSON.parse(saved) : { apiKey: '' };
      });

      useEffect(() => { localStorage.setItem('auraVocabList', JSON.stringify(vocabList)); }, [vocabList]);
      useEffect(() => { localStorage.setItem('auraSettings', JSON.stringify(settings)); }, [settings]);

      const playAudio = (text) => {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
      };

      const dueCount = vocabList.filter(v => !v.mastered && v.nextReview <= Date.now()).length;

      if (!settings.apiKey && activeTab !== 'settings') {
        return (
          <div className="h-screen w-full bg-slate-50 flex items-center justify-center p-6">
            <div className="bg-white p-8 rounded-3xl shadow-lg max-w-md w-full text-center">
              <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <Icon name="Key" size={32} />
              </div>
              <h1 className="text-2xl font-bold text-slate-800 mb-2">歡迎使用 AuraVocab</h1>
              <p className="text-slate-500 mb-8">為了啟用 AI 智慧分析與圖片辨識功能，請先綁定您的 Gemini API Key。</p>
              <button onClick={() => setActiveTab('settings')} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">前往設定金鑰</button>
            </div>
          </div>
        );
      }

      return (
        <div className="h-dvh w-full bg-slate-50 flex flex-col md:flex-row text-slate-800 font-sans overflow-hidden">
          <aside className="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 shrink-0">
            <div className="p-6 border-b border-slate-100 flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-black text-xl">A</div>
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">AuraVocab</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2">
              <NavItem active={activeTab === 'search'} onClick={() => setActiveTab('search')} icon="Search" label="單字查詢" />
              <NavItem active={activeTab === 'vision'} onClick={() => setActiveTab('vision')} icon="Camera" label="圖片萃取" />
              <NavItem active={activeTab === 'library'} onClick={() => setActiveTab('library')} icon="Book" label="單字庫" />
              <NavItem active={activeTab === 'quiz'} onClick={() => setActiveTab('quiz')} icon="Brain" label="AI 複習" badge={dueCount > 0 ? dueCount : undefined} />
              <NavItem active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="Settings" label="設定" />
            </nav>
          </aside>

          <main className="flex-1 flex flex-col min-h-0 relative">
            <header className="md:hidden shrink-0 bg-white border-b border-slate-200 p-4 sticky top-0 z-10 flex justify-center items-center">
              <h1 className="text-lg font-bold">AuraVocab</h1>
            </header>
            
            <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
              {activeTab === 'search' && <SearchTab vocabList={vocabList} setVocabList={setVocabList} apiKey={settings.apiKey} playAudio={playAudio} />}
              {activeTab === 'vision' && <VisionTab vocabList={vocabList} setVocabList={setVocabList} apiKey={settings.apiKey} playAudio={playAudio} />}
              {activeTab === 'library' && <LibraryTab vocabList={vocabList} setVocabList={setVocabList} playAudio={playAudio} />}
              {activeTab === 'quiz' && <QuizTab vocabList={vocabList} setVocabList={setVocabList} playAudio={playAudio} />}
              {activeTab === 'settings' && <SettingsTab settings={settings} setSettings={setSettings} />}
            </div>
          </main>

          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around px-1 pt-2 pb-6 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] z-50">
            <MobileNavItem active={activeTab === 'search'} onClick={() => setActiveTab('search')} icon="Search" label="查詢" />
            <MobileNavItem active={activeTab === 'vision'} onClick={() => setActiveTab('vision')} icon="Camera" label="圖片" />
            <MobileNavItem active={activeTab === 'library'} onClick={() => setActiveTab('library')} icon="Book" label="字庫" />
            <MobileNavItem active={activeTab === 'quiz'} onClick={() => setActiveTab('quiz')} icon="Brain" label="複習" badge={dueCount > 0 ? dueCount : undefined} />
            <MobileNavItem active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="Settings" label="設定" />
          </nav>
        </div>
      );
    }

    // ==========================================
    // 圖片擷取 (Vision) - 取消英文定義與例句顯示
    // ==========================================
    function VisionTab({ vocabList, setVocabList, apiKey, playAudio }) {
      const [images, setImages] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);
      const [status, setStatus] = useState('');
      const [countdown, setCountdown] = useState(0);
      const [extractedWords, setExtractedWords] = useState([]);
      const fileInputRef = useRef(null);

      const processFiles = (files) => {
        const fileArr = Array.from(files);
        fileArr.forEach(file => {
          if (!file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            setImages(prev => [...prev, { file, dataUrl: e.target.result, status: 'pending' }]);
          };
          reader.readAsDataURL(file);
        });
      };

      const extractVocabFromImage = async (base64String, mimeType) => {
        const base64Data = base64String.split(',')[1];
        
        const prompt = `You are an expert English teacher. Extract the main English vocabulary words from this image. 
        Even if the image is a screenshot of a dictionary app, vocabulary flashcards, or a list, extract the target English words being defined or shown.
        Return a strict JSON array of objects. Maximum 15 words. Each object must have this exact structure: 
        {"word": "the word", "ipa": "IPA pronunciation", "pos": "part of speech", "zh": "Traditional Chinese meaning", "exampleEn": "A practical example sentence", "exampleZh": "Translation of the example"} 
        Return ONLY the JSON array. Do not use markdown formatting.`;

        const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType, data: base64Data } }] }], generationConfig: { responseMimeType: "application/json" } };
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        if (response.status === 429) throw new Error("429");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const jsonText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!jsonText) throw new Error("No data returned");
        
        const cleanedText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
        return JSON.parse(cleanedText);
      };

      const handleStartExtraction = async () => {
        if (images.length === 0) return;
        setIsProcessing(true);
        setExtractedWords([]);
        let allNewWords = [];

        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          let success = false;
          while (!success) {
            try {
              setStatus(`正在分析圖片 ${i + 1}/${images.length}...`);
              const result = await extractVocabFromImage(img.dataUrl, img.file.type);
              
              const uniqueWords = result.filter(newWord => 
                !vocabList.some(v => v.word.toLowerCase() === newWord.word.toLowerCase()) &&
                !allNewWords.some(v => v.word.toLowerCase() === newWord.word.toLowerCase())
              );
              
              allNewWords = [...allNewWords, ...uniqueWords];
              setExtractedWords([...allNewWords]); 
              success = true;
            } catch (err) {
              if (err.message === "429") {
                setStatus(`API 限制保護觸發！`);
                for(let sec = 60; sec > 0; sec--) {
                   setCountdown(sec);
                   await new Promise(r => setTimeout(r, 1000));
                }
                setCountdown(0);
                setStatus(`恢復連線，重試圖片 ${i + 1}...`);
              } else {
                console.error("解析失敗:", err);
                setStatus(`圖片 ${i + 1} 解析失敗跳過`);
                await new Promise(r => setTimeout(r, 1500));
                success = true; 
              }
            }
          }
        }
        setStatus(allNewWords.length > 0 ? `萃取完成！共發現 ${allNewWords.length} 個新單字。` : '圖片中沒有找到新的未學單字。');
        setIsProcessing(false);
        setImages([]);
      };

      const saveToLibrary = (wordObj) => {
        setVocabList(prev => [initAnkiParams(wordObj), ...prev]);
        setExtractedWords(prev => prev.filter(w => w.word !== wordObj.word));
      };

      const saveAllToLibrary = () => {
        const wordsToAdd = extractedWords.map(w => initAnkiParams(w));
        setVocabList(prev => [...wordsToAdd, ...prev]);
        setExtractedWords([]);
        setStatus('已全部存入單字庫！');
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2 mb-4"><Icon name="Camera" className="text-indigo-500" /> 圖片自動萃取單字</h2>
            <p className="text-slate-500 mb-6 text-sm">上傳課本照片、單字卡截圖或菜單，AI 會自動掃描出所有英文單字，並過濾掉您已經學過的字！</p>

            {!isProcessing && images.length === 0 && extractedWords.length === 0 && (
              <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center cursor-pointer hover:bg-slate-50 hover:border-indigo-400 transition-colors">
                <Icon name="UploadCloud" size={48} className="mx-auto text-slate-400 mb-4" />
                <p className="text-slate-600 font-bold text-lg mb-1">點擊拍照或上傳圖片</p>
                <p className="text-slate-400 text-sm">支援 JPG, PNG (可多選)</p>
                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={(e) => processFiles(e.target.files)} />
              </div>
            )}

            {images.length > 0 && (
              <div className="space-y-4">
                <div className="flex gap-3 overflow-x-auto pb-2">
                  {images.map((img, i) => (
                    <div key={i} className="relative w-24 h-24 shrink-0 rounded-xl overflow-hidden border border-slate-200"><img src={img.dataUrl} className="w-full h-full object-cover" /></div>
                  ))}
                </div>
                {isProcessing ? (
                  <div className="bg-indigo-50 p-4 rounded-xl flex items-center justify-between border border-indigo-100">
                     <div className="flex items-center gap-3"><Icon name="Loader2" className="animate-spin text-indigo-500" /><span className="font-bold text-indigo-700">{status}</span></div>
                     {countdown > 0 && <span className="text-red-500 font-bold">倒數 {countdown} 秒</span>}
                  </div>
                ) : (
                  <div className="flex gap-3">
                    <button onClick={() => setImages([])} className="px-4 py-3 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 flex-1">重新選擇</button>
                    <button onClick={handleStartExtraction} className="px-4 py-3 rounded-xl font-bold bg-indigo-600 text-white hover:bg-indigo-700 flex-1">開始掃描單字</button>
                  </div>
                )}
              </div>
            )}
            
            {!isProcessing && status && images.length === 0 && extractedWords.length === 0 && <div className="p-4 bg-green-50 text-green-700 rounded-xl font-bold text-center border border-green-200">{status}</div>}
          </div>

          {extractedWords.length > 0 && (
            <div className="space-y-4">
              <div className="flex justify-between items-end px-2">
                <h3 className="font-bold text-slate-700 text-lg">掃描成功的單字 ({extractedWords.length})</h3>
                <button onClick={saveAllToLibrary} className="text-indigo-600 font-bold flex items-center gap-1 text-sm bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100"><Icon name="PlusCircle" size={16} /> 全部加入字庫</button>
              </div>
              <div className="grid gap-3">
                {extractedWords.map((wordObj, idx) => (
                  <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between gap-4 items-center">
                    <div className="w-full">
                      <div className="flex items-center gap-2 mb-1">
                        <button onClick={() => playAudio(wordObj.word)} className="text-amber-500 hover:text-amber-600 active:scale-95 transition-transform"><Icon name="Volume2" size={20} /></button>
                        <span className="text-xl font-bold text-slate-900">{wordObj.word}</span>
                        <span className="text-slate-400 text-sm ml-2 font-mono">{wordObj.ipa}</span>
                      </div>
                      <div className="flex gap-2 items-center mb-2">
                        <span className="bg-slate-100 text-slate-500 text-xs px-2 py-0.5 rounded uppercase font-bold">{wordObj.pos}</span>
                        <span className="text-slate-800 font-bold">{wordObj.zh}</span>
                      </div>
                    </div>
                    <button onClick={() => saveToLibrary(wordObj)} className="shrink-0 bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-sm w-full md:w-auto flex items-center justify-center gap-2 active:scale-95 transition-transform"><Icon name="Book" size={16} /> 存入</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 智慧查詢 (Search) - 精簡版 (取消例句與英文定義)
    // ==========================================
    function SearchTab({ vocabList, setVocabList, apiKey, playAudio }) {
      const [query, setQuery] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      const searchWord = async () => {
        const targetWord = query.trim().toLowerCase();
        if (!targetWord) return;
        setLoading(true); setError(null); setResult(null);

        try {
          // 修改 Prompt 移除 enDef 減少消耗
          const prompt = `Analyze the English word: "${targetWord}". Provide JSON response: {"word": "exact word lowercase", "ipa": "IPA", "pos": "part of speech", "zh": "Traditional Chinese translation", "exampleEn": "Example sentence", "exampleZh": "Traditional Chinese example translation"}`;
          const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } };
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`, { method: 'POST', body: JSON.stringify(payload) });

          if (response.status === 429) throw new Error("API 請求過於頻繁，請休息 1 分鐘後再試。");
          if (!response.ok) throw new Error("查詢失敗");

          const data = await response.json();
          const cleanedText = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(cleanedText);
          
          setResult(parsed);
          playAudio(parsed.word);
        } catch (err) { setError(err.message); } finally { setLoading(false); }
      };

      const isSaved = result && vocabList.some(v => v.word.toLowerCase() === result.word.toLowerCase());
      const saveWord = () => { if (!isSaved) setVocabList(prev => [initAnkiParams(result), ...prev]); };

      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex items-center">
            <Icon name="Search" className="text-slate-400 mx-3" size={20} />
            <input type="text" value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && searchWord()} placeholder="輸入單字查詢..." className="flex-1 bg-transparent outline-none p-2 text-lg" />
            <button onClick={searchWord} disabled={loading} className="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold disabled:opacity-50">查詢</button>
          </div>
          {loading && <div className="text-center py-10 text-indigo-500"><Icon name="Loader2" className="animate-spin mx-auto mb-2" size={32}/>分析中...</div>}
          {error && <div className="p-4 bg-red-50 text-red-600 rounded-xl flex items-center gap-2"><Icon name="AlertCircle" /> {error}</div>}
          {result && !loading && (
            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
              <div className="flex justify-between items-start mb-6">
                <div>
                  <div className="flex items-center gap-3">
                    <h2 className="text-4xl font-black text-slate-900">{result.word}</h2>
                    <button onClick={() => playAudio(result.word)} className="p-2 bg-indigo-50 text-indigo-600 rounded-full active:scale-95 transition-transform"><Icon name="Volume2" /></button>
                  </div>
                  <p className="text-slate-500 mt-2 font-mono">{result.ipa} • <span className="text-indigo-500 italic">{result.pos}</span></p>
                </div>
                <button onClick={saveWord} disabled={isSaved} className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold ${isSaved ? 'bg-green-50 text-green-600' : 'bg-slate-900 text-white active:scale-95 transition-transform'}`}>
                  {isSaved ? <><Icon name="CheckCircle" size={18}/> 已收藏</> : <><Icon name="Book" size={18}/> 收藏</>}
                </button>
              </div>
              <div className="bg-slate-50 p-4 rounded-xl">
                <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">Traditional Chinese</h3>
                <p className="text-2xl font-bold">{result.zh}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 我的單字庫 (Library) - 新增例句與專屬喇叭
    // ==========================================
    function LibraryTab({ vocabList, setVocabList, playAudio }) {
      const toggleProperty = (word, prop) => setVocabList(prev => prev.map(v => v.word === word ? { ...v, [prop]: !v[prop] } : v));
      const deleteWord = (word) => setVocabList(prev => prev.filter(v => v.word !== word));

      return (
        <div className="max-w-3xl mx-auto space-y-4">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <h2 className="text-xl font-bold">單字庫狀況</h2>
            <p className="text-slate-500 mt-1">目前共收錄 {vocabList.length} 個單字，已標記排除測驗 {vocabList.filter(v=>v.mastered).length} 個。</p>
          </div>
          {vocabList.length === 0 ? <p className="text-center text-slate-400 py-10">字庫是空的，快去查詢或擷取單字吧！</p> : 
           vocabList.map(item => (
            <div key={item.word} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between gap-4">
              
              <div className="flex gap-4 items-start w-full">
                <button onClick={() => playAudio(item.word)} className="p-2 bg-slate-100 text-slate-600 rounded-full mt-1 shrink-0 active:scale-95 transition-transform"><Icon name="Volume2" size={20}/></button>
                <div className="flex-1">
                  <div className="flex flex-wrap items-end gap-2 mb-1">
                    <h3 className={`text-xl font-bold ${item.mastered ? 'text-slate-400 line-through' : 'text-slate-900'}`}>{item.word}</h3>
                    <span className="text-sm text-slate-500 font-mono">{item.ipa}</span>
                  </div>
                  <p className="text-slate-800 font-bold mb-3">{item.zh}</p>
                  
                  {/* 例句區與例句發音 */}
                  {item.exampleEn && (
                    <div className="bg-indigo-50/50 p-3 rounded-xl border border-indigo-50/50">
                      <div className="flex items-start gap-2">
                        <button onClick={() => playAudio(item.exampleEn)} className="p-1.5 shrink-0 bg-white text-indigo-500 rounded-full shadow-sm active:scale-90 transition-transform">
                          <Icon name="Volume1" size={16} />
                        </button>
                        <div>
                          <p className="text-slate-800 font-medium leading-relaxed">{item.exampleEn}</p>
                          <p className="text-slate-500 text-sm mt-1">{item.exampleZh}</p>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-2 mt-3">
                    <span className="text-xs font-bold px-2 py-0.5 rounded bg-blue-50 text-blue-600">連續答對: {item.repetition || 0} 次</span>
                    {item.nextReview > Date.now() && <span className="text-xs font-bold px-2 py-0.5 rounded bg-green-50 text-green-600">已排程複習</span>}
                  </div>
                </div>
              </div>
              
              <div className="flex md:flex-col gap-2 shrink-0 self-end md:self-start">
                <button onClick={() => toggleProperty(item.word, 'mastered')} title="排除於測驗" className={`p-2 rounded-xl active:scale-95 transition-transform ${item.mastered ? 'text-green-600 bg-green-50' : 'text-slate-400 bg-slate-50'}`}><Icon name="CheckCircle" size={20}/></button>
                <button onClick={() => deleteWord(item.word)} className="p-2 rounded-xl text-red-400 bg-slate-50 active:scale-95 transition-transform"><Icon name="Trash2" size={20}/></button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ==========================================
    // AI 測驗 (Quiz - Anki SM-2 演算法)
    // ==========================================
    function QuizTab({ vocabList, setVocabList, playAudio }) {
      const [dueCards, setDueCards] = useState([]);
      const [current, setCurrent] = useState(null);
      const [input, setInput] = useState('');
      const [isRevealed, setIsRevealed] = useState(false);
      const [isCorrect, setIsCorrect] = useState(null);

      useEffect(() => {
        const now = Date.now();
        const activeDue = vocabList.filter(v => !v.mastered && v.nextReview <= now);
        setDueCards(activeDue);
        
        if (!current && activeDue.length > 0) {
          setCurrent(activeDue[Math.floor(Math.random() * activeDue.length)]);
        }
      }, [vocabList, current]);

      if (vocabList.length === 0) return <div className="text-center py-20 text-slate-500">請先加入單字才能進行複習！</div>;
      if (dueCards.length === 0 && !current) return (
        <div className="text-center py-20">
          <Icon name="PartyPopper" size={64} className="mx-auto text-amber-400 mb-6" />
          <h2 className="text-3xl font-black text-slate-800 mb-2">太棒了！</h2>
          <p className="text-slate-500 text-lg">您已經完成所有今天的複習進度，請明天再來喔！</p>
        </div>
      );
      if (!current) return null;

      const handleCheck = () => {
        if (!input.trim()) return;
        const correct = input.toLowerCase().trim() === current.word.toLowerCase();
        setIsCorrect(correct);
        setIsRevealed(true);
        playAudio(current.word);
      };

      const calculateNextInterval = (quality) => {
        let repetition = current.repetition || 0;
        let interval = current.interval || 0;
        let easeFactor = current.easeFactor || 2.5;

        if (quality >= 3) {
          if (repetition === 0) interval = 1;
          else if (repetition === 1) interval = 6;
          else interval = Math.round(interval * easeFactor);
          if (quality === 5) interval = Math.round(interval * 1.3);
        } else {
          interval = 0;
        }
        return interval;
      };

      const handleRating = (quality) => {
        let repetition = current.repetition || 0;
        let interval = current.interval || 0;
        let easeFactor = current.easeFactor || 2.5;

        if (quality >= 3) {
          if (repetition === 0) interval = 1;
          else if (repetition === 1) interval = 6;
          else interval = Math.round(interval * easeFactor);
          if (quality === 5) interval = Math.round(interval * 1.3);
          repetition++;
        } else {
          repetition = 0;
          interval = 0;
        }

        easeFactor = easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
        if (easeFactor < 1.3) easeFactor = 1.3;

        let nextReviewTime = Date.now();
        if (interval === 0) {
           nextReviewTime += 1 * 60 * 1000; 
        } else {
           nextReviewTime += interval * 24 * 60 * 60 * 1000; 
        }

        const updatedList = vocabList.map(v => v.word === current.word ? { ...v, repetition, interval, easeFactor, nextReview: nextReviewTime } : v);
        setVocabList(updatedList);
        
        setInput('');
        setIsRevealed(false);
        setIsCorrect(null);
        setCurrent(null);
      };

      return (
        <div className="max-w-lg mx-auto pt-6 flex flex-col min-h-[60vh]">
          <div className="flex justify-between items-center mb-8 px-2">
            <span className="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-sm">今日剩餘：{dueCards.length}</span>
            <span className="text-slate-400 text-sm font-medium">連續答對 {current.repetition || 0} 次</span>
          </div>

          <div className="text-center flex-1">
            <p className="text-slate-500 font-bold uppercase tracking-wider mb-2">{current.pos}</p>
            
            <div className="flex justify-center items-center gap-3 mb-8">
              <h2 className="text-4xl font-black text-slate-800">{current.zh}</h2>
              <button onClick={() => playAudio(current.word)} className="p-2 bg-indigo-50 text-indigo-600 rounded-full shadow-sm active:scale-90 transition-transform">
                <Icon name="Volume2" size={24} />
              </button>
            </div>
            
            {!isRevealed ? (
              <div className="space-y-4">
                <input 
                  type="text" autoFocus value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleCheck()} 
                  className="w-full text-center text-3xl p-4 bg-white rounded-2xl shadow-sm outline-none border-2 border-transparent focus:border-indigo-400 transition-colors" 
                  placeholder="請拼出英文..." 
                />
                <button onClick={handleCheck} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 active:scale-95 transition-transform">檢查答案</button>
              </div>
            ) : (
              <div className="space-y-8 animate-fade-in">
                <div className={`p-6 rounded-3xl border-2 ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                   <p className={`font-bold mb-1 ${isCorrect ? 'text-green-600' : 'text-red-500'}`}>{isCorrect ? '🎯 拼寫正確！' : '❌ 拼錯了！正確答案是：'}</p>
                   <div className="flex justify-center items-center gap-3">
                     <h3 className="text-4xl font-black text-slate-900">{current.word}</h3>
                     <button onClick={() => playAudio(current.word)} className="p-2 bg-white rounded-full shadow-sm text-slate-600 active:scale-90 transition-transform"><Icon name="Volume2" /></button>
                   </div>
                   <p className="text-slate-500 mt-2 font-mono">{current.ipa}</p>
                </div>
                
                <div>
                  <p className="text-slate-500 mb-3 text-sm font-bold">請誠實評估您的記憶程度：</p>
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => handleRating(0)} className="flex flex-col items-center p-3 rounded-2xl bg-red-50 hover:bg-red-100 border border-red-100 transition-colors active:scale-95">
                      <span className="text-red-600 font-bold mb-1">忘記</span>
                      <span className="text-red-400 text-xs">1 分鐘</span>
                    </button>
                    <button onClick={() => handleRating(3)} className="flex flex-col items-center p-3 rounded-2xl bg-orange-50 hover:bg-orange-100 border border-orange-100 transition-colors active:scale-95">
                      <span className="text-orange-600 font-bold mb-1">困難</span>
                      <span className="text-orange-400 text-xs">{calculateNextInterval(3)} 天</span>
                    </button>
                    <button onClick={() => handleRating(4)} className="flex flex-col items-center p-3 rounded-2xl bg-green-50 hover:bg-green-100 border border-green-100 transition-colors active:scale-95">
                      <span className="text-green-600 font-bold mb-1">良好</span>
                      <span className="text-green-400 text-xs">{calculateNextInterval(4)} 天</span>
                    </button>
                    <button onClick={() => handleRating(5)} className="flex flex-col items-center p-3 rounded-2xl bg-blue-50 hover:bg-blue-100 border border-blue-100 transition-colors active:scale-95">
                      <span className="text-blue-600 font-bold mb-1">簡單</span>
                      <span className="text-blue-400 text-xs">{calculateNextInterval(5)} 天</span>
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 設定 (Settings)
    // ==========================================
    function SettingsTab({ settings, setSettings }) {
      const [tempKey, setTempKey] = useState(settings.apiKey);
      return (
        <div className="max-w-2xl mx-auto">
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="Key" className="text-indigo-500"/> API Key 安全綁定</h2>
            <p className="text-sm text-slate-500 mb-4">請貼上您的 Gemini API Key。這把金鑰只會加密儲存於您手機的瀏覽器中，絕對安全，不會上傳到任何公開伺服器。</p>
            <input type="password" value={tempKey} onChange={e=>setTempKey(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl mb-4 outline-none focus:border-indigo-500" placeholder="AIzaSy..." />
            <button onClick={() => {setSettings({...settings, apiKey: tempKey}); alert('金鑰已安全儲存！');}} className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl active:scale-95 transition-transform">儲存金鑰</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // UI 元件
    // ==========================================
    function NavItem({ active, onClick, icon, label, badge }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center justify-between p-3 rounded-xl ${active ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-600 hover:bg-slate-50'}`}>
          <div className="flex items-center gap-3"><Icon name={icon} size={20} /> <span>{label}</span></div>
          {badge !== undefined && <span className="bg-indigo-500 text-white text-xs py-0.5 px-2 rounded-full font-bold">{badge}</span>}
        </button>
      );
    }

    function MobileNavItem({ active, onClick, icon, label, badge }) {
      return (
        <button onClick={onClick} className={`relative flex flex-col items-center justify-center p-2 min-w-[64px] ${active ? 'text-indigo-600' : 'text-slate-400'}`}>
          <div className={`mb-1 ${active ? 'scale-110' : ''}`}><Icon name={icon} size={24} /></div>
          <span className="text-[11px] font-bold tracking-wide">{label}</span>
          {badge !== undefined && <span className="absolute top-1 right-2 bg-indigo-500 text-white text-[10px] font-bold px-1.5 rounded-full">{badge}</span>}
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
