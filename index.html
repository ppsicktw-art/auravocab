<body class="bg-forest-50 text-slate-800 font-sans min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const APP_VERSION = 'T016';

    // --- 圖示庫 ---
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        search: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,

        settings: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
        speaker: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" /></svg>,
        trash: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>,
        check: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>,
        doubleCheck: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" /></svg>,
        error: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>,
        eye: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
        edit: <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path strokeLinecap="round" strokeLinejoin="round" d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
      };
      return <span className={`inline-block ${className}`}>{icons[name] || null}</span>;
    };

    const playAudio = (text) => {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    };

    // --- 核心工具函數 ---
    const TEXT_MODEL = "gemini-2.5-flash";

    const getTranslation = (card) => card?.translation || card?.zh || card?.zhDef || '';

    const isWordInLibrary = (word, library) =>
      library.some(card => card.word.toLowerCase() === word.trim().toLowerCase());

    // --- Anki 式 SRS 排程 (T013) ---
    const LEARNING_STEPS = [1, 10];
    const RELEARNING_STEPS = [10];
    const GRADUATING_INTERVAL = 1;
    const EASY_INTERVAL_NEW = 4;
    const MIN_EASE = 1.3;
    const STATE_LABELS = { new: '新卡', learning: '學習中', review: '複習', relearning: '重學' };
    const CARD_PRIORITY = { relearning: 0, learning: 1, new: 2, review: 3 };

    const createSrsFields = () => ({
      state: 'new', learningStep: 0, lapses: 0,
      interval: 0, ease: 2.5, repetitions: 0, nextDueDate: null,
    });

    const scheduleAfterMinutes = (minutes) =>
      new Date(Date.now() + minutes * 60 * 1000).toISOString();

    const scheduleAfterDays = (days) => {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + days);
      return d.toISOString();
    };

    const migrateCard = (card) => {
      if (card.state) return card;
      let state = 'new';
      let learningStep = 0;
      if (card.repetitions > 0 && card.interval > 0) {
        state = 'review';
      } else if (card.nextDueDate && card.interval === 0 && card.repetitions === 0) {
        const remaining = new Date(card.nextDueDate).getTime() - Date.now();
        if (remaining > 0 && remaining <= 24 * 60 * 60 * 1000) {
          state = 'learning';
          learningStep = 1;
        }
      }
      return {
        ...card,
        state,
        learningStep,
        lapses: card.lapses || 0,
        interval: card.interval ?? 0,
        ease: card.ease ?? 2.5,
        repetitions: card.repetitions ?? 0,
      };
    };

    const isCardDue = (card, now = new Date()) => {
      const c = migrateCard(card);
      if (c.state === 'new' || !c.nextDueDate) return true;
      return new Date(c.nextDueDate).getTime() <= now.getTime();
    };

    const getDueCards = (library, now = new Date()) =>
      library.filter(card => isCardDue(card, now)).map(migrateCard);

    const adjustEase = (ease, rating) => {
      if (rating === 0) return Math.max(MIN_EASE, ease - 0.2);
      if (rating === 1) return Math.max(MIN_EASE, ease - 0.15);
      if (rating === 3) return ease + 0.15;
      return ease;
    };

    const applyAnkiRating = (card, rating) => {
      let { state, learningStep, lapses, interval, ease, repetitions, previousInterval } = migrateCard(card);
      ease = adjustEase(ease, rating);
      if (state === 'new') state = 'learning';

      if (state === 'learning' || state === 'relearning') {
        const steps = state === 'learning' ? LEARNING_STEPS : RELEARNING_STEPS;
        if (rating === 0) {
          return { ...card, state, learningStep: 0, lapses, interval: 0, ease, repetitions: 0, nextDueDate: scheduleAfterMinutes(steps[0]) };
        }
        if (rating === 1) {
          const mins = steps[Math.min(learningStep, steps.length - 1)];
          return { ...card, state, learningStep, lapses, interval: 0, ease, repetitions, nextDueDate: scheduleAfterMinutes(mins) };
        }
        if (rating === 3 && state === 'learning') {
          return { ...card, state: 'review', learningStep: 0, lapses, interval: EASY_INTERVAL_NEW, ease, repetitions: 1, nextDueDate: scheduleAfterDays(EASY_INTERVAL_NEW) };
        }
        const delay = steps[Math.min(learningStep, steps.length - 1)];
        learningStep += 1;
        if (learningStep >= steps.length) {
          if (state === 'relearning') {
            const restored = Math.max(1, Math.round((previousInterval || interval || 1) * 0.5));
            return { ...card, state: 'review', learningStep: 0, lapses, interval: restored, ease, repetitions: Math.max(1, repetitions), nextDueDate: scheduleAfterDays(restored) };
          }
          return { ...card, state: 'review', learningStep: 0, lapses, interval: GRADUATING_INTERVAL, ease, repetitions: 1, nextDueDate: scheduleAfterDays(GRADUATING_INTERVAL) };
        }
        return { ...card, state, learningStep, lapses, interval: 0, ease, repetitions, nextDueDate: scheduleAfterMinutes(delay) };
      }

      if (rating === 0) {
        lapses += 1;
        return { ...card, state: 'relearning', learningStep: 0, lapses, previousInterval: interval, interval: 0, ease, repetitions: 0, nextDueDate: scheduleAfterMinutes(RELEARNING_STEPS[0]) };
      }
      if (rating === 1) {
        repetitions += 1;
        interval = repetitions === 1 ? 1 : Math.max(1, Math.round(interval * 1.2));
        return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
      }
      if (rating === 2) {
        repetitions += 1;
        if (repetitions === 1) interval = GRADUATING_INTERVAL;
        else if (repetitions === 2) interval = 6;
        else interval = Math.max(1, Math.round(interval * ease));
        return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
      }
      repetitions += 1;
      if (repetitions === 1) interval = EASY_INTERVAL_NEW;
      else interval = Math.max(1, Math.round(interval * ease * 1.3));
      return { ...card, state: 'review', learningStep: 0, lapses, interval, ease, repetitions, nextDueDate: scheduleAfterDays(interval) };
    };

    const getRatingLabels = (card) => {
      const c = migrateCard(card);
      const fmtMin = (m) => `${m}分鐘`;
      const fmtDay = (d) => `${d}天`;
      if (c.state === 'new' || c.state === 'learning') {
        const steps = LEARNING_STEPS;
        const step = c.state === 'new' ? 0 : c.learningStep;
        return {
          again: fmtMin(steps[0]),
          hard: fmtMin(steps[Math.min(step, steps.length - 1)]),
          good: step + 1 >= steps.length ? fmtDay(GRADUATING_INTERVAL) : fmtMin(steps[step]),
          easy: fmtDay(EASY_INTERVAL_NEW),
        };
      }
      if (c.state === 'relearning') {
        const steps = RELEARNING_STEPS;
        const step = c.learningStep;
        return {
          again: fmtMin(steps[0]),
          hard: fmtMin(steps[Math.min(step, steps.length - 1)]),
          good: step + 1 >= steps.length ? '恢復複習' : fmtMin(steps[step]),
          easy: fmtDay(c.previousInterval || c.interval || GRADUATING_INTERVAL),
        };
      }
      const rep = c.repetitions + 1;
      let goodDays = rep === 1 ? GRADUATING_INTERVAL : rep === 2 ? 6 : Math.max(1, Math.round(c.interval * c.ease));
      let hardDays = rep === 1 ? 1 : Math.max(1, Math.round(c.interval * 1.2));
      let easyDays = rep === 1 ? EASY_INTERVAL_NEW : Math.max(1, Math.round(c.interval * c.ease * 1.3));
      return {
        again: fmtMin(RELEARNING_STEPS[0]),
        hard: fmtDay(hardDays),
        good: fmtDay(goodDays),
        easy: fmtDay(easyDays),
      };
    };

    const pickNextCard = (activeDue, excludeId = null) => {
      const candidates = (excludeId ? activeDue.filter(c => c.id !== excludeId) : activeDue).map(migrateCard);
      if (candidates.length === 0) return null;
      const minP = Math.min(...candidates.map(c => CARD_PRIORITY[c.state] ?? 9));
      const pool = candidates.filter(c => (CARD_PRIORITY[c.state] ?? 9) === minP);
      return pool[Math.floor(Math.random() * pool.length)];
    };

    const getImageMimeType = (file) =>
      (file?.type && file.type.startsWith('image/')) ? file.type : 'image/jpeg';

    const cleanWordToken = (word) =>
      word.replace(/^[.,\/#!$%\^&\*;:{}=\-_`~()?"'“‘]+/g, '').replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'”’]+$/g, '');

    const cleanJsonString = (str) => {
      const trimmed = str.trim();
      try { return JSON.parse(trimmed); } catch (_) {}
      const objMatch = trimmed.match(/\{[\s\S]*\}/);
      if (objMatch) return JSON.parse(objMatch[0]);
      const arrMatch = trimmed.match(/\[[\s\S]*\]/);
      if (arrMatch) return JSON.parse(arrMatch[0]);
      throw new Error('無法解析 AI 回傳的 JSON');
    };

    const normalizeImportedLibrary = (parsed) => {
      if (!Array.isArray(parsed)) throw new Error('格式不正確');
      return parsed
        .filter(item => item && typeof item.word === 'string' && item.word.trim())
        .map((item, index) => ({
          id: item.id || `${Date.now()}_${index}`,
          word: item.word.trim(),
          translation: getTranslation(item) || item.word,
          pronunciation: item.pronunciation || '',
          exampleEn: item.exampleEn || '',
          exampleZh: item.exampleZh || '',
          type: item.type === 'phrase' ? 'phrase' : 'word',
          addedAt: item.addedAt || Date.now(),
          ...createSrsFields(),
          interval: typeof item.interval === 'number' ? item.interval : 0,
          ease: typeof item.ease === 'number' ? item.ease : 2.5,
          repetitions: typeof item.repetitions === 'number' ? item.repetitions : 0,
          nextDueDate: item.nextDueDate || null,
          state: item.state || 'new',
          learningStep: typeof item.learningStep === 'number' ? item.learningStep : 0,
          lapses: typeof item.lapses === 'number' ? item.lapses : 0,
        })).map(migrateCard);
    };

    const InteractiveSentence = ({ text, onWordClick }) => {
      const words = text.split(/(\s+)/);
      return words.map((part, index) => {
        if (/^\s+$/.test(part)) return <span key={index}>{part}</span>;
        const cleanWord = cleanWordToken(part);
        if (!cleanWord) return <span key={index}>{part}</span>;
        return (
          <span key={index} onClick={() => onWordClick(cleanWord)} className="cursor-pointer hover:bg-emerald-100 text-forest-700 font-semibold underline decoration-dotted decoration-emerald-400 px-0.5 rounded transition inline-block active:scale-95">
            {part}
          </span>
        );
      });
    };

    const fetchWithRetry = async (url, options, maxRetries = 3) => {
      let delay = 1000;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);
          const response = await fetch(url, { ...options, signal: controller.signal });
          clearTimeout(timeoutId);

          if (response.ok) return await response.json();
          if (response.status === 429) {
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
            continue;
          }
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData?.error?.message || `HTTP ${response.status}`);
        } catch (err) {
          if (i === maxRetries - 1) throw err;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }
    };

    // --- 獨立練習元件 (SinglePracticeView) ---
    function SinglePracticeView({ wordObj, playAudio, onBack }) {
      const [input, setInput] = useState('');
      const [isRevealed, setIsRevealed] = useState(false);
      const [isCorrect, setIsCorrect] = useState(null);

      const handleSubmit = () => {
        if (!input.trim()) return;
        const correct = input.trim().toLowerCase() === wordObj.word.toLowerCase();
        setIsCorrect(correct);
        setIsRevealed(true);
        playAudio(wordObj.word);
      };

      const handleContinue = () => {
        setInput('');
        setIsRevealed(false);
        setIsCorrect(null);
      };

      return (
        <div className="max-w-md mx-auto pt-4 animate-fade-in flex flex-col min-h-[60vh] space-y-6">
          <div className="flex justify-between items-center mb-4">
            <button onClick={onBack} className="text-slate-400 hover:text-slate-700 font-bold text-sm px-3 py-1 bg-white rounded-full border shadow-sm">← 返回字庫</button>
            <span className="text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-widest">單字練習</span>
          </div>

          <div className="text-center flex-1">
            {/* 相容舊卡片 translation 變數名稱 */}
            <h2 className="text-3xl font-black text-slate-800 mb-8 leading-tight">{getTranslation(wordObj)}</h2>
            
            {!isRevealed ? (
              <div className="space-y-4">
                <div className="flex gap-2">
                  <input 
                    type="text" autoFocus value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSubmit()} 
                    className="w-full text-center text-3xl p-4 bg-white rounded-2xl shadow-sm outline-none border-2 border-transparent focus:border-indigo-400 transition-colors" 
                    placeholder="輸入拼寫..." 
                  />
                  <button onClick={() => playAudio(wordObj.word)} className="p-3 bg-forest-50 text-forest-700 rounded-2xl hover:bg-forest-100 transition active:scale-95 border border-forest-100 shrink-0 flex items-center justify-center">
                    <Icon name="speaker" className="w-6 h-6" />
                  </button>
                </div>
                <button onClick={handleSubmit} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 active:scale-95 transition-transform">送出對決</button>
              </div>
            ) : (
              <div className="space-y-8 animate-fade-in">
                <div className={`p-6 rounded-3xl border-2 ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                   <p className={`font-bold mb-2 ${isCorrect ? 'text-green-600' : 'text-red-500'}`}>{isCorrect ? '🎯 完全正確！' : '❌ 拼寫錯誤'}</p>
                   
                   <div className="flex justify-center items-center gap-3">
                     <h3 className="text-4xl font-black text-slate-900">{wordObj.word}</h3>

                   </div>
                   
                   {!isCorrect && (
                     <p className="mt-4 text-sm font-bold text-slate-600 bg-white/50 p-2 rounded-xl inline-block">
                        您的輸入：<span className="text-red-500 ml-1">{input}</span>
                     </p>
                   )}
                </div>
                
                <div className="flex gap-3">
                  <button onClick={handleContinue} className="flex-1 bg-slate-100 text-slate-700 hover:bg-slate-200 py-4 rounded-2xl font-bold transition-colors">繼續練習</button>
                  <button onClick={onBack} className="flex-1 bg-indigo-600 text-white hover:bg-indigo-700 py-4 rounded-2xl font-bold transition-colors shadow-md">返回</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 1. 查詢分頁 ---
    function SearchTab({ apiKey, library, setLibrary, searchTriggerWord, clearTrigger, showToast, onTriggerSearch }) {
      const [searchText, setSearchText] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);

      const runSearch = async (wordToSearch) => {
        const trimmed = wordToSearch.trim();
        if (!trimmed) return;
        if (!apiKey) return showToast('請先至設定分頁輸入您的 API 金鑰！', 'error');

        setLoading(true);
        setResult(null);
        try {
          const prompt = `您是一個專業的高效英語翻譯官。請精準、簡明地翻譯這個單字或片語: "${trimmed}"。請僅以 JSON 格式回傳，格式必須嚴格如下：
{
  "word": "${trimmed}",
  "pronunciation": "KK音標",
  "translation": "極簡精準繁體中文翻譯",
  "exampleEn": "一行實用英文例句",
  "exampleZh": "例句的繁體中文翻譯",
  "type": "word 或 phrase"
}`;
          const responseData = await fetchWithRetry(
            `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
            }
          );
          const parsed = cleanJsonString(responseData.candidates[0].content.parts[0].text);
          setResult(parsed);
          playAudio(parsed.word);
        } catch (err) {
          showToast(`查詢失敗: ${err.message}`, 'error');
        } finally { setLoading(false); }
      };

      useEffect(() => {
        if (!searchTriggerWord) return;
        const trimmed = searchTriggerWord.trim();
        setSearchText(trimmed);
        clearTrigger();
        runSearch(trimmed);
      }, [searchTriggerWord, apiKey]);

      const handleSearch = (e) => {
        if (e) e.preventDefault();
        runSearch(searchText);
      };

      const handleSave = () => {
        if (!result) return;
        if (library.some(card => card.word.toLowerCase() === result.word.toLowerCase())) return showToast('已經在庫中囉！', 'error');
        setLibrary(prev => [{ id: Date.now().toString(), ...result, addedAt: Date.now(), ...createSrsFields() }, ...prev]);
        showToast('已成功存入單字庫！', 'success');
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <form onSubmit={handleSearch} className="flex gap-2">
            <input type="text" value={searchText} onChange={(e) => setSearchText(e.target.value)} placeholder="請輸入英文單字或片語..." className="flex-1 px-4 py-3 border border-slate-200 rounded-xl shadow-sm focus:outline-none focus:border-forest-600 font-medium" />
            <button id="search-trigger-btn" type="submit" disabled={loading} className="bg-forest-700 hover:bg-forest-600 text-white font-bold px-6 py-3 rounded-xl shadow transition active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
              {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><Icon name="search" className="w-5 h-5" /><span>查詢</span></>}
            </button>
          </form>

          {result && (
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
              <div className="flex justify-between items-start">
                <div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <h2 className="text-2xl font-bold text-forest-800 tracking-wide">{result.word}</h2>
                    <button onClick={() => playAudio(result.word)} className="text-forest-600 hover:text-forest-700 p-1.5 bg-forest-50 hover:bg-forest-100 rounded-full transition active:scale-90"><Icon name="speaker" className="w-5 h-5" /></button>
                  </div>
                  {result.pronunciation && <span className="text-sm font-medium text-slate-400 font-mono inline-block mt-1">{result.pronunciation}</span>}
                </div>
                <span className="text-xs font-semibold px-2 py-1 bg-emerald-50 text-emerald-700 rounded-lg">{result.type === 'phrase' ? '片語' : '單字'}</span>
              </div>
              <div className="border-t border-slate-100 pt-4 space-y-3">
                <div><span className="text-xs text-slate-400 font-bold tracking-wider">中文翻譯</span><p className="text-lg font-bold text-slate-700 mt-1">{getTranslation(result)}</p></div>
                {result.exampleEn && (
                  <div className="space-y-2">
                    <span className="text-xs text-slate-400 font-bold tracking-wider">例句</span>
                    <div className="flex items-start justify-between gap-2">
                      <p className="text-sm text-slate-600 leading-relaxed font-medium"><InteractiveSentence text={result.exampleEn} onWordClick={onTriggerSearch} /></p>
                      <button onClick={() => playAudio(result.exampleEn)} className="text-emerald-700 hover:text-emerald-800 p-1 bg-emerald-50 rounded-lg transition active:scale-90 flex-shrink-0"><Icon name="speaker" className="w-4 h-4" /></button>
                    </div>
                    {result.exampleZh && <p className="text-xs font-bold text-slate-400">{result.exampleZh}</p>}
                  </div>
                )}
              </div>
              <button onClick={handleSave} className="w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-800 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition active:scale-95"><Icon name="doubleCheck" className="w-5 h-5 text-emerald-600" /><span>儲存到單字庫</span></button>
            </div>
          )}
        </div>
      );
    }

    // --- 2. 圖片萃取分頁 ---
    function VisionTab({ apiKey, library, setLibrary, showToast }) {
      const [loading, setLoading] = useState(false);
      const [images, setImages] = useState([]);
      const [ocrMode, setOcrMode] = useState('smart');
      const [scannedResults, setScannedResults] = useState([]);
      const [skippedCount, setSkippedCount] = useState(0);

      const handleImageChange = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const readPromises = files.map(file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve({ file, preview: reader.result, base64: reader.result.split(',')[1], mimeType: getImageMimeType(file) });
            reader.readAsDataURL(file);
        }));
        Promise.all(readPromises).then(results => setImages(prev => [...prev, ...results]));
        e.target.value = '';
      };

      const handleRemoveImage = (index) => setImages(prev => prev.filter((_, i) => i !== index));

      const dedupeItems = (items) => {
        const seen = new Set();
        return items.filter(item => {
          const key = (item.word || '').trim().toLowerCase();
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      };

      const buildCardFromItem = (item, index) => ({
        ...item,
        id: `${Date.now()}_${index}`,
        type: item.type === 'phrase' ? 'phrase' : 'word',
        addedAt: Date.now(),
        ...createSrsFields(),
      });

      const scanImage = async (img, prompt) => {
        const responseData = await fetchWithRetry(
          `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: img.mimeType, data: img.base64 } }] }], generationConfig: { responseMimeType: "application/json" } }) }
        );
        return cleanJsonString(responseData.candidates[0].content.parts[0].text);
      };

      const scanPhrases = async () => {
        const allItems = [];
        for (const img of images) {
          const prompt = `您是英語片語卡 OCR 助手。圖片為「深綠色背景、白色文字」的片語學習卡，格式通常為：
第1行：英文片語
第2行：繁體中文翻譯
第3行：英文例句
第4行：例句中文翻譯

請直接抄寫圖中內容，不要改寫、不要自行新增或替換例句。
若一張圖有多組片語，每組各輸出一筆。
僅回傳 JSON：{ "items": [ { "word": "英文片語", "translation": "中文翻譯", "exampleEn": "英文例句", "exampleZh": "例句中文", "pronunciation": "", "type": "phrase" } ] }`;

          const parsed = await scanImage(img, prompt);
          if (parsed?.items) allItems.push(...parsed.items.filter(i => i?.word?.trim()));
        }
        return allItems.map(item => ({ ...item, type: 'phrase' }));
      };

      const scanSmart = async () => {
        const allItems = [];
        for (const img of images) {
          const prompt = `您是 AuraVocab 智慧掃描助手。請分析圖片，自動判斷每筆內容屬於「單字」或「片語」，並擷取對應欄位。

【片語卡特徵】深綠色背景、白色文字，通常含：英文片語 → 中文翻譯 → 英文例句 → 中文例句
→ type 設為 "phrase"，直接抄寫圖中例句，不要改寫或新增

【單字卡特徵】白色卡片，通常含：英文單字、KK/DJ 音標、詞性、中文釋義，通常「沒有例句」
→ type 設為 "word"，exampleEn 與 exampleZh 留空字串，不要自行補例句

規則：忽略喇叭圖示；一圖多筆各輸出一筆；無法辨識則略過。
僅回傳 JSON：{ "items": [ { "word": "...", "pronunciation": "...", "translation": "...", "exampleEn": "...", "exampleZh": "...", "type": "word 或 phrase" } ] }`;

          const parsed = await scanImage(img, prompt);
          if (parsed?.items) {
            allItems.push(...parsed.items.filter(i => i?.word?.trim()).map(item => ({
              ...item,
              type: item.type === 'phrase' ? 'phrase' : 'word',
              exampleEn: item.exampleEn || '',
              exampleZh: item.exampleZh || '',
            })));
          }
        }
        return allItems;
      };

      const scanWords = async () => {
        const allItems = [];
        for (const img of images) {
          const prompt = `您是英語單字卡 OCR 助手。圖片為「白色卡片」的單字學習卡，格式通常為：
- 英文單字（左側可能有喇叭圖示，請忽略圖示）
- KK[...] 與 DJ[...] 音標（合併寫入 pronunciation）
- 詞性標示（如 a.形容詞、n.名詞，可忽略不輸出）
- 繁體中文釋義

此格式「沒有例句」，請勿自行補充例句。
若一張圖有多張單字卡，每張各輸出一筆。
僅回傳 JSON：{ "items": [ { "word": "英文單字", "pronunciation": "KK[...], DJ[...]", "translation": "繁體中文釋義", "type": "word" } ] }`;

          const parsed = await scanImage(img, prompt);
          if (parsed?.items) allItems.push(...parsed.items.filter(i => i?.word?.trim()));
        }
        return allItems.map(item => ({ ...item, type: 'word', exampleEn: '', exampleZh: '' }));
      };

      const generateWordExamples = async (words) => {
        if (!words.length) return {};
        const prompt = `您是英語教學助理。以下單字已有翻譯與音標，請「僅為每個單字各補充一組實用例句」，不要修改 word、translation、pronunciation。
單字清單：${JSON.stringify(words.map(w => ({ word: w.word, translation: getTranslation(w), pronunciation: w.pronunciation || '' })))}
僅回傳 JSON：{ "items": [ { "word": "與清單完全一致", "exampleEn": "英文例句", "exampleZh": "例句繁體中文" } ] }`;

        const responseData = await fetchWithRetry(
          `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) }
        );
        const parsed = cleanJsonString(responseData.candidates[0].content.parts[0].text);
        const map = {};
        (parsed?.items || []).forEach(row => {
          if (row?.word) map[row.word.trim().toLowerCase()] = row;
        });
        return map;
      };

      const handleScan = async () => {
        if (!images.length) return;
        if (!apiKey) return showToast('請先至設定分頁輸入您的 API 金鑰！', 'error');

        setLoading(true);
        setSkippedCount(0);
        try {
          let extracted;
          if (ocrMode === 'smart') extracted = await scanSmart();
          else if (ocrMode === 'phrase') extracted = await scanPhrases();
          else extracted = await scanWords();

          extracted = dedupeItems(extracted);
          const newItems = extracted.filter(item => !isWordInLibrary(item.word, library));
          const skipped = extracted.length - newItems.length;
          setSkippedCount(skipped);

          if (newItems.length === 0) {
            setScannedResults([]);
            setImages([]);
            showToast(skipped > 0 ? `掃描完成！${skipped} 個字詞已在字庫` : '掃描完成，但未發現有效字詞', skipped > 0 ? 'info' : 'error');
            return;
          }

          const wordsNeedingExamples = newItems.filter(i => i.type === 'word' && !i.exampleEn?.trim());
          let results = newItems;
          if (wordsNeedingExamples.length > 0) {
            const exampleMap = await generateWordExamples(wordsNeedingExamples);
            results = newItems.map(item => {
              if (item.type !== 'word' || item.exampleEn?.trim()) return item;
              const ex = exampleMap[item.word.trim().toLowerCase()];
              return ex ? { ...item, exampleEn: ex.exampleEn || '', exampleZh: ex.exampleZh || '' } : item;
            });
          }

          setScannedResults(results);
          setImages([]);
          const wordCount = results.filter(i => i.type === 'word').length;
          const phraseCount = results.filter(i => i.type === 'phrase').length;
          let msg;
          if (ocrMode === 'smart') {
            msg = skipped > 0
              ? `智慧掃描：${wordCount} 單字、${phraseCount} 片語，跳過 ${skipped} 個重複`
              : `智慧掃描完成！${wordCount} 單字、${phraseCount} 片語`;
          } else {
            const label = ocrMode === 'phrase' ? '片語' : '單字';
            msg = skipped > 0
              ? `新發現 ${results.length} 個${label}，已跳過 ${skipped} 個字庫重複`
              : `萃取完成！共發現 ${results.length} 個${label}`;
          }
          showToast(msg, 'success');
        } catch (err) {
          showToast(`掃描中斷: ${err.message}`, 'error');
        } finally { setLoading(false); }
      };

      const handleSaveScanned = (item, index) => {
        if (isWordInLibrary(item.word, library)) return showToast('已在庫中囉！', 'error');
        setLibrary(prev => [buildCardFromItem(item, index), ...prev]);
        setScannedResults(prev => prev.filter((_, i) => i !== index));
        showToast('已成功存入單字庫！', 'success');
      };

      const handleSaveAll = () => {
        const toSave = scannedResults.filter(item => !isWordInLibrary(item.word, library));
        if (toSave.length === 0) return showToast('沒有可儲存的新字詞', 'error');
        setLibrary(prev => [...toSave.map((item, i) => buildCardFromItem(item, i)), ...prev]);
        setScannedResults([]);
        showToast(`已成功存入 ${toSave.length} 個字詞！`, 'success');
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
            <div className="flex items-center justify-between gap-2">
              <span className="text-sm font-bold text-slate-500 shrink-0">掃描模式</span>
              <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                <button onClick={() => setOcrMode('smart')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'smart' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🧠 智慧</button>
                <button onClick={() => setOcrMode('word')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'word' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🔍 單字</button>
                <button onClick={() => setOcrMode('phrase')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${ocrMode === 'phrase' ? 'bg-forest-700 text-white' : 'text-slate-600'}`}>🔗 片語</button>
              </div>
            </div>
            <p className="text-xs text-slate-400 leading-relaxed">
              {ocrMode === 'smart'
                ? '智慧掃描：自動辨識綠色片語卡或白色單字卡，分類擷取；單字自動補例句，片語保留原例句。'
                : ocrMode === 'phrase'
                  ? '片語模式：適用深綠色片語卡（含翻譯與例句），直接抄寫入庫，不另補例句。'
                  : '單字模式：適用白色單字卡（含音標與釋義、無例句），掃描後 AI 自動補充例句。'}
            </p>
          </div>
          <div className="border-2 border-dashed border-slate-200 bg-white rounded-2xl p-6 flex flex-col items-center justify-center min-h-[160px] relative">
            <input type="file" multiple accept="image/*" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
            <Icon name="camera" className="w-10 h-10 text-slate-300 mb-2" />
            <p className="text-sm font-bold text-slate-500">點擊上傳{ocrMode === 'smart' ? '' : ocrMode === 'phrase' ? '片語' : '單字'}截圖</p>
            {ocrMode === 'smart' && <p className="text-xs text-slate-400 mt-1">可混合上傳單字卡與片語卡</p>}
          </div>
          {images.length > 0 && (
            <div className="grid grid-cols-4 gap-2">
              {images.map((img, idx) => (
                <div key={idx} className="relative aspect-square rounded-xl overflow-hidden border border-slate-100"><img src={img.preview} className="object-cover w-full h-full" /><button onClick={() => handleRemoveImage(idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-0.5 shadow"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12" /></svg></button></div>
              ))}
            </div>
          )}
          {images.length > 0 && (
            <button onClick={handleScan} disabled={loading} className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-3.5 rounded-xl shadow transition">
              {loading ? <div className="mx-auto w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : ocrMode === 'smart' ? '開始智慧掃描' : '開始高效掃描'}
            </button>
          )}
          {scannedResults.length > 0 && (
            <div className="space-y-4">
              <div className="flex items-center justify-between gap-2">
                <h3 className="text-sm font-bold text-slate-400 tracking-wider">💡 待審核內容 ({scannedResults.length})</h3>
                <button onClick={handleSaveAll} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 shadow transition active:scale-95 shrink-0">
                  <Icon name="doubleCheck" className="w-4 h-4" /><span>一鍵全部儲存</span>
                </button>
              </div>
              {skippedCount > 0 && (
                <p className="text-xs font-medium text-slate-400 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2">已自動跳過 {skippedCount} 個字庫中已有的字詞</p>
              )}
              {scannedResults.map((item, idx) => (
                <div key={idx} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm space-y-3">
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-1 flex-wrap">
                        <h4 className="text-lg font-bold text-slate-800">{item.word}</h4>
                        <button onClick={() => playAudio(item.word)} className="p-1 hover:bg-slate-100 rounded-full transition"><Icon name="speaker" className="w-4 h-4 text-forest-700" /></button>
                        <span className="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full">{item.type === 'phrase' ? '片語' : '單字'}</span>
                      </div>
                      {item.pronunciation && <span className="text-xs font-mono text-slate-400">{item.pronunciation}</span>}
                    </div>
                    <button onClick={() => handleSaveScanned(item, idx)} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 shadow"><Icon name="check" className="w-3.5 h-3.5" /><span>儲存</span></button>
                  </div>
                  <div><span className="text-xs text-slate-400 font-semibold block">中文翻譯</span><p className="text-sm font-bold text-slate-700 mt-0.5">{getTranslation(item)}</p></div>
                  {item.exampleEn && (
                    <div className="border-t border-slate-50 pt-2 space-y-1">
                      <span className="text-xs text-slate-400 font-semibold block">例句</span>
                      <p className="text-sm text-slate-600 leading-relaxed">{item.exampleEn}</p>
                      {item.exampleZh && <p className="text-xs font-bold text-slate-400">{item.exampleZh}</p>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- 3. 字庫與即點即查分頁 ---
    function LibraryTab({ library, setLibrary, onTriggerSearch, showToast, onPractice }) {
      const [filter, setFilter] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');

      const handleDelete = (id) => {
        setLibrary(prev => prev.filter(card => card.id !== id));
        showToast('字詞已成功刪除！', 'success');
      };

      const filteredList = useMemo(() => {
        return library.filter(card => {
          const matchesFilter = filter === 'all' || card.type === filter;
          const matchesSearch = card.word.toLowerCase().includes(searchTerm.toLowerCase()) || getTranslation(card).includes(searchTerm);
          return matchesFilter && matchesSearch;
        });
      }, [library, filter, searchTerm]);

      return (
        <div className="space-y-4 animate-fade-in">
          <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} placeholder="搜尋庫中的單字或中文..." className="w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm focus:outline-none focus:border-forest-600 font-medium" />
          <div className="flex gap-2 justify-center">
            {['all', 'word', 'phrase'].map(type => (
              <button key={type} onClick={() => setFilter(type)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition ${filter === type ? 'bg-forest-700 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                {type === 'all' ? '全部' : type === 'word' ? '單字' : '片語'}
              </button>
            ))}
          </div>
          <div className="space-y-4">
            {filteredList.length === 0 ? <div className="text-center py-12 text-slate-400 font-medium">空空的...</div> : (
              filteredList.map(card => (
                <div key={card.id} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm space-y-4 relative overflow-hidden">
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-1 flex-wrap">
                        <h4 className="text-xl font-bold text-forest-800 tracking-wide">{card.word}</h4>
                        <button onClick={() => playAudio(card.word)} className="text-forest-600 hover:text-forest-700 p-1 bg-forest-50 hover:bg-forest-100 rounded-full transition active:scale-90"><Icon name="speaker" className="w-4 h-4" /></button>
                      </div>
                      {card.pronunciation && <p className="text-xs font-mono text-slate-400 mt-0.5">{card.pronunciation}</p>}
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] font-bold px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full">{STATE_LABELS[migrateCard(card).state] || '新卡'}</span>
                      <span className="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full">{card.type === 'phrase' ? '片語' : '單字'}</span>
                      <button onClick={() => handleDelete(card.id)} className="text-red-400 hover:text-red-500 p-1.5 bg-red-50 rounded-lg transition active:scale-90"><Icon name="trash" className="w-4 h-4" /></button>
                    </div>
                  </div>
                  <div className="bg-forest-50/50 p-3 rounded-xl border border-forest-50"><p className="text-base font-bold text-slate-700">{getTranslation(card)}</p></div>
                  {card.exampleEn && (
                    <div className="border-t border-slate-100 pt-3 space-y-2">
                      <div className="flex items-start justify-between gap-1">
                        <div className="text-sm text-slate-600 leading-relaxed font-medium"><InteractiveSentence text={card.exampleEn} onWordClick={onTriggerSearch} /></div>
                        <button onClick={() => playAudio(card.exampleEn)} className="text-emerald-700 hover:text-emerald-800 p-1 bg-emerald-50 rounded-lg transition active:scale-90 flex-shrink-0" title="朗讀整句"><Icon name="speaker" className="w-4 h-4" /></button>
                      </div>
                      <p className="text-xs font-bold text-slate-400">{card.exampleZh}</p>
                    </div>
                  )}
                  {/* 新增的單字庫「練習」按鈕 */}
                  <div className="border-t border-slate-50 pt-2 flex justify-end">
                    <button onClick={() => onPractice(card)} className="px-4 py-1.5 text-xs font-bold text-forest-700 bg-forest-50 hover:bg-forest-100 rounded-lg transition active:scale-95 flex items-center gap-1.5">
                      <Icon name="edit" className="w-3.5 h-3.5" /> 練習
                    </button>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // --- 4. 🧠 測驗與 Anki SRS (QuizTab) ---
    function QuizTab({ library, setLibrary, showToast, active }) {
      const [dueCards, setDueCards] = useState([]);
      const [currentCard, setCurrentCard] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [userInput, setUserInput] = useState('');
      const [isCorrect, setIsCorrect] = useState(null);
      const [showHint, setShowHint] = useState(false);

      const resetQuizInput = () => {
        setShowAnswer(false);
        setUserInput('');
        setIsCorrect(null);
        setShowHint(false);
      };

      useEffect(() => {
        if (!active) return;
        const activeDue = getDueCards(library);
        setDueCards(activeDue);
        if (!currentCard || !activeDue.find(c => c.id === currentCard.id)) {
          setCurrentCard(pickNextCard(activeDue));
          resetQuizInput();
        }
      }, [library, active]);

      const handleCheckAnswer = () => {
        const cleanUser = userInput.trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "");
        const cleanActual = currentCard.word.trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "");
        setIsCorrect(cleanUser === cleanActual);
        setShowAnswer(true);
        playAudio(currentCard.word);
      };

      const handleAnkiRate = (rating) => {
        const ratedId = currentCard.id;
        const updated = library.map(card =>
          card.id === ratedId ? applyAnkiRating(card, rating) : card
        );
        setLibrary(updated);
        const activeDue = getDueCards(updated);
        setDueCards(activeDue);
        setCurrentCard(pickNextCard(activeDue, ratedId));
        resetQuizInput();
        showToast('排程更新！', 'success');
      };

      const ratingLabels = currentCard ? getRatingLabels(currentCard) : null;

      const generateHintPattern = (word) => {
        return word.split('').map(char => {
          if (char === ' ') return '  ';
          if (/[a-zA-Z]/.test(char)) return '_ ';
          return char + ' ';
        }).join('');
      };

      if (library.length === 0) return <div className="text-center py-20 text-slate-500 font-bold">字庫還沒有單字，請先去查詢或萃取喔！</div>;
      
      if (!currentCard) {
        return (
          <div className="bg-white rounded-2xl p-8 border border-slate-100 shadow-sm text-center space-y-4 animate-fade-in mt-10">
            <div className="text-6xl mb-4">🎉</div>
            <h2 className="text-2xl font-bold text-forest-800">目前無到期卡片！</h2>
            <p className="text-slate-500 font-medium">學習中的單字將在 1～10 分鐘後重新出現；已畢業的單字則依排程在到期日出現。可加新單字或稍後再回來！</p>
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-6 mt-4">
            <div className="flex justify-between items-center border-b border-slate-100 pb-3">
              <span className="text-xs font-bold text-slate-400">🧠 到期卡片: {dueCards.length} 張</span>
              <div className="flex gap-1.5">
                <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md font-bold">{STATE_LABELS[migrateCard(currentCard).state] || '新卡'}</span>
                <span className="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-md font-bold">{currentCard.type === 'phrase' ? '片語' : '單字'}</span>
              </div>
            </div>

            <div className="text-center py-4 space-y-3">
              <span className="text-xs text-slate-400 font-bold tracking-wider">中文提示</span>
              <div className="flex items-center justify-center gap-2">
                <h3 className="text-2xl font-extrabold text-forest-800 tracking-wide">{getTranslation(currentCard) || "無中文提示"}</h3>
                <button onClick={() => playAudio(currentCard.word)} className="text-forest-600 hover:text-forest-700 p-2 bg-forest-50 hover:bg-forest-100 rounded-full transition active:scale-90" title="播放發音提示"><Icon name="speaker" className="w-5 h-5" /></button>
              </div>
            </div>

            {!showAnswer && (
              <div className="space-y-4 border-t border-slate-50 pt-4">
                <div className="flex flex-col items-center gap-2">
                  {!showHint ? (
                    <button onClick={() => setShowHint(true)} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold text-amber-600 bg-amber-50 hover:bg-amber-100 rounded-full transition active:scale-95">
                      <Icon name="eye" className="w-4 h-4" /> 顯示長度提示
                    </button>
                  ) : (
                    <div className="animate-fade-in bg-slate-50 border border-slate-100 px-4 py-2 rounded-xl">
                       <span className="text-lg font-mono text-slate-400 tracking-widest whitespace-pre">{generateHintPattern(currentCard.word)}</span>
                    </div>
                  )}
                </div>

                <div className="flex gap-2">
                  <input type="text" value={userInput} onChange={(e) => setUserInput(e.target.value)} placeholder="試著在這裡拼寫英文..." className="w-full text-center text-lg font-semibold px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-forest-600 shadow-inner" onKeyDown={(e) => e.key === 'Enter' && handleCheckAnswer()} />
                  <button onClick={() => playAudio(currentCard.word)} className="p-3 bg-forest-50 text-forest-700 rounded-2xl hover:bg-forest-100 transition active:scale-95 border border-forest-100 shrink-0 flex items-center justify-center">
                    <Icon name="speaker" className="w-6 h-6" />
                  </button>
                </div>
                
                <button onClick={handleCheckAnswer} className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-3.5 rounded-2xl shadow active:scale-95 transition">💡 檢查答案</button>
              </div>
            )}

            {showAnswer && (
              <div className="space-y-6 pt-4 border-t border-slate-100 animate-fade-in">
                <div className="text-center space-y-2">
                  <div className="flex items-center justify-center gap-2">
                    <h4 className="text-3xl font-black text-emerald-800 tracking-wider">{currentCard.word}</h4>
                    <button onClick={() => playAudio(currentCard.word)} className="p-1 bg-emerald-50 rounded-full hover:bg-emerald-100 transition active:scale-90"><Icon name="speaker" className="w-5 h-5 text-emerald-700" /></button>
                  </div>
                  {currentCard.pronunciation && <span className="text-sm font-mono text-slate-400 font-semibold">{currentCard.pronunciation}</span>}
                  
                  {isCorrect !== null && (
                    <p className={`text-sm font-bold ${isCorrect ? 'text-emerald-600' : 'text-red-500'}`}>
                      {isCorrect ? '✨ 完全正確，太棒了！' : `❌ 建議按「再次」重新學習 (您輸入了: ${userInput})`}
                    </p>
                  )}
                </div>

                <div className="grid grid-cols-4 gap-2">
                  <button onClick={() => handleAnkiRate(0)} className={`bg-red-50 hover:bg-red-100 border py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition ${!isCorrect ? 'border-red-400 ring-2 ring-red-200' : 'border-red-200'} text-red-800`}>
                    <span className="text-sm font-bold">再次</span><span className="text-[10px] font-medium text-red-500">{ratingLabels?.again}</span>
                  </button>
                  <button onClick={() => handleAnkiRate(1)} className="bg-orange-50 hover:bg-orange-100 border border-orange-200 text-orange-800 py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                    <span className="text-sm font-bold">困難</span><span className="text-[10px] font-medium text-orange-500">{ratingLabels?.hard}</span>
                  </button>
                  <button onClick={() => handleAnkiRate(2)} className={`bg-emerald-50 hover:bg-emerald-100 border py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition ${isCorrect ? 'border-emerald-400 ring-2 ring-emerald-200' : 'border-emerald-200'} text-emerald-800`}>
                    <span className="text-sm font-bold">良好</span><span className="text-[10px] font-medium text-emerald-500">{ratingLabels?.good}</span>
                  </button>
                  <button onClick={() => handleAnkiRate(3)} className="bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-800 py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                    <span className="text-sm font-bold">簡單</span><span className="text-[10px] font-medium text-blue-500">{ratingLabels?.easy}</span>
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 5. ⚙️ 設定分頁 (SettingsTab) ---
    function SettingsTab({ apiKey, onSaveKey, library, setLibrary, showToast }) {
      const [keyInput, setKeyInput] = useState(apiKey);
      const [showClearConfirm, setShowClearConfirm] = useState(false);

      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `AuraVocab_Backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast('字庫備份導出成功！', 'success');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            const normalized = normalizeImportedLibrary(parsed);
            if (normalized.length === 0) return showToast('備份中沒有有效的單字資料！', 'error');
            setLibrary(normalized);
            showToast(`字庫匯入成功！共 ${normalized.length} 筆`, 'success');
          } catch (err) {
            showToast(err.message === '格式不正確' ? '格式不正確！' : '解析備份檔案時出錯！', 'error');
          }
        };
        reader.readAsText(file);
      };

      const handleClear = () => {
        setLibrary([]);
        setShowClearConfirm(false);
        showToast('資料已成功重設！', 'success');
      };

      return (
        <div className="space-y-6 animate-fade-in bg-white rounded-3xl p-6 border border-slate-100 shadow-sm mt-4">
          <h2 className="text-lg font-bold text-forest-800 border-b border-slate-100 pb-3">⚙️ 系統與金鑰設定</h2>
          <div className="space-y-2">
            <label className="text-sm font-bold text-slate-500 block">Gemini API 金鑰</label>
            <input type="password" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder="請輸入 AIzaSy... 開頭金鑰" className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-forest-600 font-mono text-sm" />
            <button onClick={() => onSaveKey(keyInput.trim())} className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition text-sm shadow">儲存金鑰</button>
          </div>
          <div className="border-t border-slate-100 pt-6 space-y-4">
            <h3 className="text-sm font-bold text-slate-500 block">📦 資料管理與備份</h3>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={handleExport} className="bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold transition active:scale-95">💾 導出備份 JSON</button>
              <label className="bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold text-center cursor-pointer transition active:scale-95">
                <span>📂 匯入備份 JSON</span><input type="file" accept=".json" onChange={handleImport} className="hidden" />
              </label>
            </div>
            {!showClearConfirm ? (
              <button onClick={() => setShowClearConfirm(true)} className="w-full bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 py-3 rounded-xl text-xs font-bold transition active:scale-95">⚠️ 清空所有字庫與 Anki 進度</button>
            ) : (
              <div className="bg-red-50 p-4 rounded-2xl border border-red-200 space-y-3 animate-fade-in">
                <p className="text-xs font-bold text-red-800 text-center">此動作為不可逆之操作，您確定要清空所有資料與學習記錄嗎？</p>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={handleClear} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95">確定清空</button>
                  <button onClick={() => setShowClearConfirm(false)} className="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2 rounded-xl text-xs transition active:scale-95">取消</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
