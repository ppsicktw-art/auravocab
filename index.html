        resetQuizPhase();
      };

      const advanceCardWithRating = (rating) => {
        const ratedId = currentCard.id;
        const updated = library.map(card =>
          card.id === ratedId ? applyAnkiRating(card, rating) : card
        );
        setLibrary(updated);
        const activeDue = getDueCards(updated);
        setDueCards(activeDue);
        setCurrentCard(pickNextCard(activeDue, ratedId));
        resetForNextCard();
        showToast('排程更新！', 'success');
      };

      const persistBreakdown = (cardId, word, data) => {
        const key = normalizeWordKey(word);
        setLibrary(prev => prev.map(c =>
          c.id === cardId
            ? { ...c, syllableParts: data.syllableParts, kkParts: data.kkParts, breakdownWord: key }
            : c
        ));
      };

      const clearCardBreakdown = (cardId) => {
        setLibrary(prev => prev.map(c => {
          if (c.id !== cardId) return c;
          const { syllableParts, kkParts, breakdownWord, ...rest } = c;
          return rest;
        }));
      };

      const loadWordBreakdown = async (card) => {
        const reqId = ++breakdownReqRef.current;
        const cardId = card.id;
        const wordKey = normalizeWordKey(card.word);
        setWordBreakdown(null);
        setBreakdownCardId(cardId);
        setBreakdownLoading(true);

        const applyBreakdown = (data) => {
          if (reqId !== breakdownReqRef.current) return;
          if (data.forWord !== wordKey) return;
          setWordBreakdown(data);
          setBreakdownCardId(cardId);
          setBreakdownLoading(false);
        };

        const cached = getValidCachedBreakdown(card);
        if (cached) {
          applyBreakdown(cached);
          return;
        }
        if (card.syllableParts?.length || card.kkParts?.length) {
          clearCardBreakdown(cardId);
        }
        if (!apiKey) {
          applyBreakdown(guessWordBreakdown(card));
          return;
        }
        try {
          const data = await fetchWordBreakdown(apiKey, card);
          if (reqId !== breakdownReqRef.current) return;
          if (data.forWord !== wordKey) return;
          setWordBreakdown(data);
          setBreakdownCardId(cardId);
          setBreakdownLoading(false);
          persistBreakdown(cardId, card.word, data);
        } catch {
          applyBreakdown(guessWordBreakdown(card));
        }
      };

      useEffect(() => {
        if (!active) return;
        const activeDue = getDueCards(library);
        setDueCards(activeDue);

        if (correctionCardId) {
          const pinned = library.find(c => c.id === correctionCardId);
          if (pinned) {
            setCurrentCard(migrateCard(pinned));
          } else {
            setCorrectionCardId(null);
            setCurrentCard(pickNextCard(activeDue));
            resetQuizPhase();
          }
          return;
        }

        if (!currentCard || !activeDue.find(c => c.id === currentCard.id)) {
          setCurrentCard(pickNextCard(activeDue));
          resetForNextCard();
        }
      }, [library, active, correctionCardId]);

      const handleCheckAnswer = () => {
        if (!userInput.trim()) return showToast('請輸入拼寫', 'error');
        const correct = normalizeSpelling(userInput) === normalizeSpelling(currentCard.word);
        setIsCorrect(correct);
        setWrongAwaitingChoice(!correct);
        playAudio(currentCard.word);

        if (currentCard.type !== 'phrase') {
          const freshCard = library.find(c => c.id === currentCard.id) || currentCard;
          loadWordBreakdown(freshCard);
        }

        if (isCorrectionRound && correct) {
          advanceToNextCard();
          return;
        }
        setQuizPhase(2);
      };

      const handleAnkiAfterAnswer = (rating) => {
        if (isCorrect) {
          advanceCardWithRating(rating);
          return;
        }
        const ratedId = currentCard.id;
        const updated = library.map(card =>
          card.id === ratedId ? applyAnkiRating(card, rating) : card
        );
        setCorrectionCardId(ratedId);
        setLibrary(updated);
        setQuizPhase(1);
        setUserInput('');
        setIsCorrect(null);
        showToast('更正練習：再試一次，直到拼對為止', 'info');
      };

      const handleRetrySpelling = () => {
        setQuizPhase(1);
        setUserInput('');
        setIsCorrect(null);
        setWrongAwaitingChoice(false);
        breakdownReqRef.current += 1;
        setWordBreakdown(null);
        setBreakdownCardId(null);
        setBreakdownLoading(false);
      };

      if (library.length === 0) return <div className="text-center py-20 text-slate-500 font-bold">字庫還沒有單字，請先去查詢或萃取喔！</div>;

      if (!currentCard) {
        return (
          <div className="bg-white rounded-2xl p-8 border border-slate-100 shadow-sm text-center space-y-4 animate-fade-in mt-10">
            <div className="text-6xl mb-4">🎉</div>
            <h2 className="text-2xl font-bold text-forest-800">目前無到期卡片！</h2>
            <p className="text-slate-500 font-medium">學習中的單字將在 1～10 分鐘後重新出現；已畢業的單字則依排程在到期日出現。可加新單字或稍後再回來！</p>
          </div>
        );
      }

      const ratingLabels = getRatingLabels(currentCard);
      const liveCard = library.find(c => c.id === currentCard.id) || currentCard;
      const spellingDiff = !isCorrect && userInput.trim()
        ? buildSpellingDiff(currentCard.word, userInput.trim())
        : [];
      const letterSlots = mapInputToWordSlots(currentCard.word, userInput);
      const currentWordKey = normalizeWordKey(currentCard.word);
      const cachedBreakdown = getValidCachedBreakdown(liveCard);
      const activeBreakdown = wordBreakdown?.forWord === currentWordKey && breakdownCardId === currentCard.id
        ? wordBreakdown
        : cachedBreakdown;
      const syllableParts = activeBreakdown?.syllableParts || liveCard.syllableParts;
      const kkParts = activeBreakdown?.kkParts || liveCard.kkParts;
      const showBreakdown = quizPhase === 2
        && currentCard.type !== 'phrase'
        && (breakdownLoading || activeBreakdown);
      const showAnkiOptions = !isCorrectionRound && (isCorrect || !wrongAwaitingChoice);

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-6 mt-4">
            <div className="flex justify-between items-center border-b border-slate-100 pb-3">
              <span className="text-xs font-bold text-slate-400">🧠 到期卡片: {dueCards.length} 張</span>
              <div className="flex gap-1.5">
                <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md font-bold">{STATE_LABELS[migrateCard(currentCard).state] || '新卡'}</span>
                <span className="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-md font-bold">{currentCard.type === 'phrase' ? '片語' : '單字'}</span>
                {isCorrectionRound && (
                  <span className="text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded-md font-bold">更正練習</span>
                )}
              </div>
            </div>

            {quizPhase === 1 && (
              <div className="space-y-6 animate-fade-in">
                <div className="text-center space-y-3 pt-2">
                  <p className="text-xs font-bold text-slate-400 tracking-wider">① 聽發音，拼寫英文</p>
                  <button
                    onClick={() => playAudio(currentCard.word)}
                    className="mx-auto flex items-center justify-center w-24 h-24 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full shadow-lg transition active:scale-95"
                    aria-label="播放發音"
                  >
                    <Icon name="speaker" className="w-12 h-12" />
                  </button>
                  <p className="text-[11px] text-slate-400">點喇叭聽單字，再拼寫</p>
                </div>

                <div className="space-y-3">
                  <div className="flex flex-wrap justify-center gap-1.5 px-1">
                    {letterSlots.map(slot => (
                      slot.isLetter ? (
                        <span
                          key={slot.key}
                          className="inline-flex w-9 h-11 items-center justify-center border-2 border-slate-200 rounded-lg bg-slate-50 text-xl font-bold font-mono"
                        >
                          {slot.display ? (
                            <span className="text-forest-800">{slot.display}</span>
                          ) : (
                            <span className="text-slate-300">_</span>
                          )}
                        </span>
                      ) : (
                        <span key={slot.key} className="w-2" />
                      )
                    ))}
                  </div>
                  <input
                    ref={spellingInputRef}
                    type="text"
                    autoFocus
                    value={userInput}
                    onChange={(e) => setUserInput(e.target.value)}
                    placeholder="輸入英文拼寫…"
                    className="w-full text-center text-lg font-semibold px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-forest-600 shadow-inner"
                    onKeyDown={(e) => e.key === 'Enter' && handleCheckAnswer()}
                    {...SPELLING_INPUT_PROPS}
                  />
                </div>

                <button
                  onClick={handleCheckAnswer}
                  className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-3.5 rounded-2xl shadow active:scale-95 transition"
                >
                  檢查答案
                </button>
              </div>
            )}

            {quizPhase === 2 && (
              <div className="space-y-6 pt-2 border-t border-slate-100 animate-fade-in">
                <div className={`text-center space-y-3 rounded-2xl p-4 ${isCorrect ? 'bg-emerald-50/60 border border-emerald-100' : 'bg-slate-50 border border-slate-100'}`}>
                  <p className="text-xs font-bold text-slate-400 tracking-wider">② 答案面</p>
                  <p className={`text-sm font-bold ${isCorrect ? 'text-emerald-600' : 'text-amber-600'}`}>
                    {isCorrect ? '✨ 拼寫正確！' : '❌ 拼寫有誤，請對照正確答案'}
                  </p>

                  <div className="flex items-center justify-center gap-2">
                    <h4 className="text-3xl font-black text-emerald-800 tracking-wider">{currentCard.word}</h4>
                    <button onClick={() => playAudio(currentCard.word)} className="p-1 bg-emerald-50 rounded-full hover:bg-emerald-100 transition active:scale-90"><Icon name="speaker" className="w-5 h-5 text-emerald-700" /></button>
                  </div>

                  {currentCard.pronunciation && (
                    <span className="text-sm font-mono text-slate-500 font-semibold block">{currentCard.pronunciation}</span>
                  )}

                  {syllableParts?.length > 0 && (
                    <div className="text-xs text-slate-500 font-medium space-y-0.5">
                      <p>音節：{formatSyllableParts(syllableParts)}</p>
                      {kkParts?.length > 0 && (
                        <p className="font-mono">KK：{kkParts.map(p => `[${p.replace(/^\[|\]$/g, '')}]`).join(' • ')}</p>
                      )}
                    </div>
                  )}

                  {!isCorrect && spellingDiff.length > 0 && (
                    <div className="space-y-1.5 pt-1">
                      <p className="text-xs font-bold text-slate-400">您的拼寫</p>
                      <div className="text-2xl font-mono font-bold tracking-wider flex flex-wrap justify-center gap-0.5">
                        {spellingDiff.map((cell, i) => (
                          <span
                            key={i}
                            className={
                              cell.status === 'correct' ? 'text-emerald-700' :
                              cell.status === 'missing' ? 'text-red-400 underline decoration-red-400 decoration-2' :
                              'text-red-500'
                            }
                          >
                            {cell.char}
                          </span>
                        ))}
                      </div>
                      <p className="text-[10px] text-slate-400">綠色＝正確字母　紅色＝錯誤或缺少</p>
                    </div>
                  )}

                  <div className="pt-2 border-t border-slate-100/80">
                    <span className="text-xs text-slate-400 font-bold tracking-wider">中文意思</span>
                    <h3 className="text-xl font-extrabold text-forest-800 tracking-wide mt-1">
                      {getTranslation(currentCard) || '無中文提示'}
                    </h3>
                  </div>
                </div>

                {liveCard.exampleEn && (
                  <div className="border-t border-slate-100 pt-3 space-y-2">
                    <span className="text-xs text-slate-400 font-bold tracking-wider">例句</span>
                    <div className="flex items-start justify-between gap-1">
                      <div className="text-sm text-slate-600 leading-relaxed font-medium">
                        <InteractiveSentence text={liveCard.exampleEn} onWordClick={onTriggerSearch} />
                      </div>
                      <button onClick={() => playAudio(liveCard.exampleEn)} className="text-emerald-700 hover:text-emerald-800 p-1 bg-emerald-50 rounded-lg transition active:scale-90 flex-shrink-0" title="朗讀整句"><Icon name="speaker" className="w-4 h-4" /></button>
                    </div>
                    {liveCard.exampleZh && <p className="text-xs font-bold text-slate-400">{liveCard.exampleZh}</p>}
                  </div>
                )}

                {showBreakdown && (
                  <div className="bg-slate-900 text-white rounded-2xl p-4 overflow-x-auto">
                    {breakdownLoading && !activeBreakdown ? (
                      <div className="flex items-center justify-center gap-2 py-4 text-slate-400 text-sm font-medium">
                        <div className="w-4 h-4 border-2 border-slate-500 border-t-white rounded-full animate-spin" />
                        <span>載入音節拆解中…</span>
                      </div>
                    ) : activeBreakdown ? (
                      <table className="w-full min-w-[320px] text-sm">
                        <thead>
                          <tr className="text-slate-400 text-xs border-b border-slate-700">
                            <th className="text-left font-bold pb-2 pr-3">單字</th>
                            <th className="text-left font-bold pb-2 pr-3">音節拆解</th>
                            <th className="text-left font-bold pb-2 pr-3">KK 音標拆解</th>
                            <th className="text-left font-bold pb-2">中文意思</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr key={currentCard.id}>
                            <td className="font-bold py-3 pr-3 align-top whitespace-nowrap">{currentCard.word}</td>
                            <td className="py-3 pr-3 align-top font-medium tracking-wide">{formatSyllableParts(activeBreakdown.syllableParts)}</td>
                            <td className="py-3 pr-3 align-top">
                              <div className="flex flex-wrap items-center gap-1">
                                {activeBreakdown.kkParts.flatMap((part, i) => [
                                  i > 0 ? <span key={`sep-${i}`} className="text-slate-500 text-xs">•</span> : null,
                                  <span key={`kk-${i}`} className="bg-slate-700 px-2 py-0.5 rounded font-mono text-xs">[{part.replace(/^\[|\]$/g, '')}]</span>,
                                ])}
                              </div>
                            </td>
                            <td className="py-3 align-top font-bold text-slate-200">{getTranslation(currentCard)}</td>
                          </tr>
                        </tbody>
                      </table>
                    ) : null}
                  </div>
                )}

                {!isCorrect && wrongAwaitingChoice ? (
                  <div className="flex gap-3">
                    <button onClick={handleRetrySpelling} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3.5 rounded-2xl font-bold transition active:scale-95">繼續練習</button>
                    <button onClick={() => setWrongAwaitingChoice(false)} className="flex-1 bg-forest-700 hover:bg-forest-600 text-white py-3.5 rounded-2xl font-bold transition active:scale-95 shadow">下一個單字</button>
                  </div>
                ) : showAnkiOptions ? (
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => handleAnkiAfterAnswer(0)} className={`bg-red-50 hover:bg-red-100 border py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition ${!isCorrect ? 'border-red-400 ring-2 ring-red-200' : 'border-red-200'} text-red-800`}>
                      <span className="text-sm font-bold">再次</span><span className="text-[10px] font-medium text-red-500">{ratingLabels?.again}</span>
                    </button>
                    <button onClick={() => handleAnkiAfterAnswer(1)} className="bg-orange-50 hover:bg-orange-100 border border-orange-200 text-orange-800 py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                      <span className="text-sm font-bold">困難</span><span className="text-[10px] font-medium text-orange-500">{ratingLabels?.hard}</span>
                    </button>
                    <button onClick={() => handleAnkiAfterAnswer(2)} className={`bg-emerald-50 hover:bg-emerald-100 border py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition ${isCorrect ? 'border-emerald-400 ring-2 ring-emerald-200' : 'border-emerald-200'} text-emerald-800`}>
                      <span className="text-sm font-bold">良好</span><span className="text-[10px] font-medium text-emerald-500">{ratingLabels?.good}</span>
                    </button>
                    <button onClick={() => handleAnkiAfterAnswer(3)} className="bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-800 py-3 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
                      <span className="text-sm font-bold">簡單</span><span className="text-[10px] font-medium text-blue-500">{ratingLabels?.easy}</span>
                    </button>
                  </div>
                ) : (
                  <button
                    onClick={handleRetrySpelling}
                    className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-3.5 rounded-2xl shadow active:scale-95 transition"
                  >
                    再試一次
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 5. ⚙️ 設定分頁 (SettingsTab) ---
    function SettingsTab({
      apiKey, onSaveKey, library, setLibrary, showToast,
      firebaseUser, syncStatus, lastSync, autoSync, onAutoSyncChange,
      onGoogleSignIn, onGoogleSignOut, onForceSync, authLoading,
      syncConflict, onResolveConflict,
    }) {
      const [keyInput, setKeyInput] = useState(apiKey);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [showClearCacheConfirm, setShowClearCacheConfirm] = useState(false);
      const [ocrCacheCount, setOcrCacheCount] = useState(getOcrCacheCount());

      useEffect(() => { setOcrCacheCount(getOcrCacheCount()); }, []);

      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `AuraVocab_Backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast('字庫備份導出成功！', 'success');
      };

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            const list = Array.isArray(parsed) ? parsed : parsed.library;
            const normalized = normalizeImportedLibrary(list);
            if (normalized.length === 0) return showToast('備份中沒有有效的單字資料！', 'error');
            setLibrary(normalized);
            showToast(`字庫匯入成功！共 ${normalized.length} 筆`, 'success');
          } catch (err) {
            showToast(err.message === '格式不正確' ? '格式不正確！' : '解析備份檔案時出錯！', 'error');
          }
        };
        reader.readAsText(file);
      };

      const handleClear = () => {
        setLibrary([]);
        setShowClearConfirm(false);
        showToast('資料已成功重設！', 'success');
      };

      const handleClearOcrCache = () => {
        clearOcrCache();
        setOcrCacheCount(0);
        setShowClearCacheConfirm(false);
        showToast('OCR 快取已清除', 'success');
      };

      return (
        <div className="space-y-6 animate-fade-in bg-white rounded-3xl p-6 border border-slate-100 shadow-sm mt-4">
          <h2 className="text-lg font-bold text-forest-800 border-b border-slate-100 pb-3">⚙️ 系統與金鑰設定</h2>
          <div className="space-y-2">
            <label className="text-sm font-bold text-slate-500 block">Gemini API 金鑰</label>
            <input type="password" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder="請輸入 AIzaSy... 開頭金鑰" className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-forest-600 font-mono text-sm" />
            <button onClick={() => onSaveKey(keyInput.trim())} className="w-full bg-forest-700 hover:bg-forest-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition text-sm shadow">儲存金鑰</button>
          </div>
          <div className="border-t border-slate-100 pt-6 space-y-4">
            <h3 className="text-sm font-bold text-slate-500 block">🖼️ 圖片掃描快取</h3>
            <p className="text-xs text-slate-400 leading-relaxed">已掃描過的圖片會記住 OCR 結果（目前 {ocrCacheCount} 筆），再次上傳相同圖片時不會呼叫 API。</p>
            {!showClearCacheConfirm ? (
              <button onClick={() => setShowClearCacheConfirm(true)} className="w-full bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold transition active:scale-95">🗑️ 清除 OCR 快取</button>
            ) : (
              <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 space-y-3 animate-fade-in">
                <p className="text-xs font-bold text-amber-800 text-center">清除後，相同圖片再次掃描將重新呼叫 API。確定清除？</p>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={handleClearOcrCache} className="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95">確定清除</button>
                  <button onClick={() => setShowClearCacheConfirm(false)} className="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2 rounded-xl text-xs transition active:scale-95">取消</button>
                </div>
              </div>
            )}
          </div>
          <div className="border-t border-slate-100 pt-6 space-y-4">
            <h3 className="text-sm font-bold text-slate-500 block">☁️ Firebase 雲端同步</h3>
            <p className="text-xs text-slate-400 leading-relaxed">
              登入 Google 帳號後，字庫會自動同步至 Firestore。
              {lastSync && <> 上次{lastSync.direction === 'upload' ? '上傳' : '下載'}：{formatSyncTime(lastSync.at)}（{lastSync.count} 筆）</>}
            </p>
            {firebaseUser ? (
              <div className="space-y-3">
                <div className="flex items-center justify-between text-xs bg-emerald-50 border border-emerald-100 rounded-xl px-3 py-2.5">
                  <span className="font-bold text-emerald-700 truncate">✓ {firebaseUser.email || firebaseUser.displayName || '已登入'}</span>
                  <button onClick={onGoogleSignOut} className="text-slate-500 hover:text-slate-700 font-bold shrink-0 ml-2">登出</button>
                </div>
                <label className="flex items-center gap-2 text-xs text-slate-600 font-medium cursor-pointer">
                  <input type="checkbox" checked={autoSync} onChange={(e) => onAutoSyncChange(e.target.checked)} className="rounded" />
                  自動同步字庫至雲端
                </label>
                <div className="flex items-center justify-between text-[11px] text-slate-400">
                  <span>{syncStatus === 'syncing' ? '同步中…' : syncStatus === 'error' ? '同步錯誤' : '就緒'}</span>
                  <span>本機 {library.length} 筆</span>
                </div>
                <button
                  onClick={onForceSync}
                  disabled={syncStatus === 'syncing'}
                  className="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-800 py-3 rounded-xl text-xs font-bold transition active:scale-95 disabled:opacity-50"
                >
                  {syncStatus === 'syncing' ? '同步中…' : '⬆️ 立即上傳至雲端'}
                </button>
              </div>
            ) : (
              <button
                onClick={onGoogleSignIn}
                disabled={authLoading}
                className="w-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold transition active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2"
              >
                {authLoading ? '登入中…' : '🔐 使用 Google 登入同步'}
              </button>
            )}
            {syncConflict && (
              <div className="bg-amber-50 p-4 rounded-2xl border border-amber-200 space-y-3 animate-fade-in">
                <p className="text-xs font-bold text-amber-800 text-center">
                  本機（{syncConflict.localCount} 筆）與雲端（{syncConflict.cloudCount} 筆）皆有資料，請選擇要以哪邊為準：
                </p>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => onResolveConflict('cloud')} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95">使用雲端</button>
                  <button onClick={() => onResolveConflict('local')} className="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95">使用本機</button>
                </div>
              </div>
            )}
          </div>
          <div className="border-t border-slate-100 pt-6 space-y-4">
            <h3 className="text-sm font-bold text-slate-500 block">📦 資料管理與備份</h3>
            <div className="grid grid-cols-2 gap-2">
              <button onClick={handleExport} className="bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold transition active:scale-95">💾 導出備份 JSON</button>
              <label className="bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 py-3 rounded-xl text-xs font-bold text-center cursor-pointer transition active:scale-95">
                <span>📂 匯入備份 JSON</span><input type="file" accept=".json" onChange={handleImport} className="hidden" />
              </label>
            </div>
            {!showClearConfirm ? (
              <button onClick={() => setShowClearConfirm(true)} className="w-full bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 py-3 rounded-xl text-xs font-bold transition active:scale-95">⚠️ 清空所有字庫與 Anki 進度</button>
            ) : (
              <div className="bg-red-50 p-4 rounded-2xl border border-red-200 space-y-3 animate-fade-in">
                <p className="text-xs font-bold text-red-800 text-center">此動作為不可逆之操作，您確定要清空所有資料與學習記錄嗎？</p>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={handleClear} className="bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded-xl text-xs transition active:scale-95">確定清空</button>
                  <button onClick={() => setShowClearConfirm(false)} className="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2 rounded-xl text-xs transition active:scale-95">取消</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
